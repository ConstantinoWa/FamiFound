<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1f2d">
<title>FamiFound</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;}
body{background:#0d1f2d;color:#e8f4fd;font-family:system-ui,sans-serif;height:100%;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 13px 20px;}
nav{display:flex;background:#152536;border-top:1px solid #243d55;flex-shrink:0;}
.nt{flex:1;padding:7px 4px 10px;text-align:center;font-size:.68rem;cursor:pointer;color:#6a8fa8;border-top:2px solid transparent;user-select:none;}
.nt.on{color:#00d4aa;border-top-color:#00d4aa;}
.ni{font-size:1.2rem;margin-bottom:1px;}
.card{background:#1a2f42;border:1px solid #243d55;border-radius:13px;padding:14px;margin-bottom:12px;}
.ct{font-size:.67rem;color:#6a8fa8;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mbox{background:#152536;border-radius:9px;padding:8px 6px;text-align:center;}
.mlbl{font-size:.62rem;color:#6a8fa8;margin-bottom:4px;}
.mval{font-family:monospace;font-size:.88rem;font-weight:700;}
.c-i{color:#2dd4bf;}.c-e{color:#f87171;}.c-g{color:#ffd166;}.c-b{color:#4fc3f7;}.c-m{color:#6a8fa8;}
input,select,textarea{width:100%;background:#1a2f42;border:1px solid #243d55;border-radius:9px;color:#e8f4fd;padding:9px 12px;font-size:.9rem;font-family:inherit;outline:none;-webkit-appearance:none;}
textarea{resize:none;height:52px;}
.btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#00d4aa,#00b894);color:#0d1f2d;font-size:.92rem;font-weight:700;cursor:pointer;}
.btn-g{padding:8px 16px;border-radius:9px;border:none;background:linear-gradient(135deg,#00d4aa,#00b894);color:#0d1f2d;font-weight:700;cursor:pointer;font-size:.85rem;white-space:nowrap;}
.btn-w{padding:8px 14px;border-radius:9px;border:1px solid #243d55;background:none;color:#6a8fa8;cursor:pointer;font-size:.85rem;white-space:nowrap;}
.btn-dis{background:#243d55;color:#6a8fa8;cursor:default;}
.chip{display:flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;cursor:pointer;user-select:none;font-size:.83rem;border:1.5px solid #243d55;color:#6a8fa8;background:#152536;}
.chip.on{border-color:#00d4aa;color:#00d4aa;background:rgba(0,212,170,.1);}
.row{display:flex;align-items:center;gap:8px;}
.row-sb{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;}
.sl{font-size:.67rem;color:#6a8fa8;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.sep{border:none;border-bottom:1px solid #243d55;margin:0;}
.delbtn{background:none;border:none;color:#6a8fa8;cursor:pointer;padding:3px 8px;font-size:.8rem;border-radius:6px;white-space:nowrap;flex-shrink:0;}
.delbtn.armed{background:rgba(248,113,113,.15);border:1px solid #f87171;color:#f87171;font-weight:700;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0;}
.dig-wrap{position:relative;display:inline-flex;align-items:center;gap:4px;cursor:text;}
.dig{display:flex;align-items:center;justify-content:center;border-radius:8px;font-family:monospace;font-weight:700;}
.dig.lg{width:42px;height:52px;font-size:1.4rem;}
.dig.sm{width:34px;height:42px;font-size:1.1rem;}
.dig-inp{position:absolute;inset:0;opacity:.01;width:100%;height:100%;border:none;background:transparent;font-size:16px;}
.dig-unit{color:#6a8fa8;font-size:.82rem;margin-left:3px;}
.type-tog{display:flex;gap:8px;margin-bottom:12px;}
.tbtn{flex:1;padding:9px 4px;border-radius:9px;border:1px solid #243d55;background:#152536;color:#6a8fa8;cursor:pointer;font-size:.87rem;font-weight:600;text-align:center;transition:all .15s;}
.tbtn.inc{border-color:#2dd4bf;background:rgba(45,212,191,.12);color:#2dd4bf;}
.tbtn.exp{border-color:#f87171;background:rgba(248,113,113,.12);color:#f87171;}
.rec{display:flex;align-items:flex-start;gap:9px;padding:10px 0;border-bottom:1px solid #243d55;}
.rec:last-child{border-bottom:none;}
.alloc-slider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:6px;border-radius:3px;outline:none;cursor:pointer;
  background:#243d55;margin:10px 0 4px;
}
.alloc-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:24px;height:24px;border-radius:50%;
  background:#00d4aa;cursor:pointer;
  box-shadow:0 0 0 4px rgba(0,212,170,.2);
}
.alloc-slider::-moz-range-thumb{
  width:24px;height:24px;border-radius:50%;border:none;
  background:#00d4aa;cursor:pointer;
}
.alloc-slider::-webkit-slider-runnable-track{background:transparent;}

.bar-group{display:flex;align-items:flex-end;gap:8px;min-height:160px;padding:22px 4px 8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:48px;}
.bar-bars{width:100%;display:flex;gap:3px;align-items:flex-end;height:120px;}
.bar{flex:1;border-radius:4px 4px 0 0;position:relative;min-width:8px;}
.bar-lbl{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:.55rem;white-space:nowrap;}
.prog{height:7px;background:#243d55;border-radius:4px;overflow:hidden;margin-top:12px;}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#00d4aa,#ffd166);}
.legend{display:flex;justify-content:center;gap:16px;margin-top:6px;}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="hdr" style="background:#152536;border-bottom:1px solid #243d55;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="font-size:1rem;font-weight:700;color:#6a8fa8;letter-spacing:1px;">💰 v04191041</div>
    <div style="display:flex;align-items:center;gap:2px;">
      <button id="prev-mo" style="background:none;border:none;color:#00d4aa;font-size:1.3rem;cursor:pointer;padding:2px 8px;">‹</button>
      <span id="mo-lbl" style="font-family:monospace;font-size:.82rem;min-width:66px;text-align:center;"></span>
      <button id="next-mo" style="background:none;border:none;color:#00d4aa;font-size:1.3rem;cursor:pointer;padding:2px 8px;">›</button>
    </div>
  </div>
  <div id="scr"></div>
  <nav id="nav">
    <div class="nt on" data-tab="0"><div class="ni">🏦</div>繳納</div>
    <div class="nt" data-tab="1"><div class="ni">📊</div>分配</div>
    <div class="nt" data-tab="2"><div class="ni">📒</div>記帳</div>
    <div class="nt" data-tab="3"><div class="ni">📈</div>總計</div>
    <div class="nt" data-tab="4"><div class="ni">👤</div>個人</div>
  </nav>
</div>

<script>
// ════ 資料 ══════════════════════════════════════════════
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};
const pad=n=>String(n).padStart(2,'0');
const fmt=n=>Number(n||0).toLocaleString('zh-TW');
const uid=()=>Date.now()+Math.floor(Math.random()*9999);
const now_=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());};
const prevMK=(yr,mo)=>{let m=mo-1,y=yr;if(m<1){m=12;y--;}return y+'-'+pad(m);};

const DEF_MEM=[{id:1,name:'老公',color:'#2196F3',defaultAmt:25000},{id:2,name:'老婆',color:'#E91E63',defaultAmt:25000}];
const DEF_CATS=[
  {id:1,name:'家用',icon:'🏠',defPP:7000},{id:2,name:'小孩',icon:'👶',defPP:6500},
  {id:3,name:'旅遊',icon:'✈️',defPP:5000},{id:4,name:'汽車',icon:'🚗',defPP:3000},
  {id:5,name:'房子',icon:'🏗️',defPP:3500},{id:6,name:'其他',icon:'📦',defPP:0},
];
const EXP_TYPES=[{i:'🍽️',l:'飲食'},{i:'🏠',l:'居家'},{i:'🚗',l:'交通'},{i:'🎮',l:'娛樂'},{i:'💊',l:'醫療'},{i:'📱',l:'通訊'},{i:'📚',l:'進修'},{i:'📦',l:'其他'}];
const P_INC=[{i:'💰',l:'薪資'},{i:'🏆',l:'獎金'},{i:'📈',l:'投資'},{i:'🎁',l:'紅包'},{i:'💼',l:'兼差'},{i:'📦',l:'其他'}];
const P_EXP=[{i:'🍽️',l:'飲食'},{i:'🏠',l:'居家'},{i:'🚗',l:'交通'},{i:'🎮',l:'娛樂'},{i:'💊',l:'醫療'},{i:'📱',l:'通訊'},{i:'📚',l:'進修'},{i:'📦',l:'其他'}];
const CAT_ICONS=['🎯','💡','🌟','📚','💪','🔑','🎪','🧩'];

// ════ 狀態 ══════════════════════════════════════════════
const now=new Date();
const TODAY_YR=now.getFullYear(), TODAY_MO=now.getMonth()+1;
let S={
  yr:TODAY_YR, mo:TODAY_MO, tab:0,
  members:    LS.get('fm_mem',   DEF_MEM),
  contribs:   LS.get('fm_cont',  []),
  categories: LS.get('fm_cats',  DEF_CATS),
  allocs:     LS.get('fm_alloc', []),
  expenses:   LS.get('fm_exps',  []),
  extras:     LS.get('fm_extras',[]),
  personal:   LS.get('fm_pers',  []),
  selfId:     LS.get('fm_selfId','1'),
  // UI 暫態
  contribOpen:{}, editDef:{}, editNm:{}, nmVal:{}, defVal:{},
  allocAddOpen:false, allocNewName:'',
  ledgerCat:null, ledgerType:null, ledgerAmt:0, ledgerNote:'',
  extraOpen:{}, extraMode:{},
  persType:'income', persCat:null, persAmt:0, persNote:'',
  armedDel:{},
};
function save(key,val){
  // 對應短 key，與讀取時一致
  const KM={members:'mem',contribs:'cont',categories:'cats',allocs:'alloc',expenses:'exps',extras:'extras',personal:'pers'};
  S[key]=val;
  LS.set('fm_'+(KM[key]||key),val);
}
function mkey(){return S.yr+'-'+pad(S.mo);}
// 是否為當月（唯讀判斷）
function isCurrent(){return S.yr===TODAY_YR&&S.mo===TODAY_MO;}
// 唯讀提示橫幅
function readonlyBanner(){
  return div({style:{background:'rgba(255,209,102,.08)',border:'1px solid rgba(255,209,102,.3)',borderRadius:'10px',padding:'10px 14px',marginBottom:'12px',display:'flex',alignItems:'center',gap:'8px'}},[
    span({style:{fontSize:'1.1rem'}},['🔒']),
    div({},[
      div({style:{fontWeight:700,fontSize:'.82rem',color:'#ffd166'}},['歷史月份（唯讀）']),
      div({style:{fontSize:'.72rem',color:'#6a8fa8',marginTop:'2px'}},['只能查看，無法新增或修改'])
    ])
  ]);
}
function pmkey(){return prevMK(S.yr,S.mo);}
function monthTotal(){return S.contribs.filter(c=>c.month===mkey()).reduce((s,c)=>s+c.amount,0);}
function catBalance(catId,month){
  const a=(S.allocs.find(x=>x.catId===catId&&x.month===month)||{amount:0}).amount;
  const e=S.extras.filter(x=>x.catId===catId&&x.month===month).reduce((s,x)=>s+x.amount,0);
  const s=S.expenses.filter(x=>x.catId===catId&&x.date.startsWith(month)).reduce((s,x)=>s+x.amount,0);
  return a+e-s;
}

// ════ 渲染 ══════════════════════════════════════════════
function render(resetScroll=false){
  document.getElementById('mo-lbl').textContent=S.yr+'/'+pad(S.mo);
  document.querySelectorAll('.nt').forEach(el=>el.classList.toggle('on',el.dataset.tab==S.tab));
  const scr=document.getElementById('scr');
  const prevScroll=scr.scrollTop;
  scr.innerHTML='';
  const builders=[page0,page1,page2,page3,page4];
  scr.appendChild(builders[S.tab]());
  scr.scrollTop=resetScroll?0:prevScroll;
}

// ════ 工具 HTML ═════════════════════════════════════════
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c!=null&&c!==false){if(typeof c==='string'){e.appendChild(document.createTextNode(c));}else{e.appendChild(c);}}});
  return e;
}
function div(attrs,children){return el('div',attrs,children);}
function span(attrs,children){return el('span',attrs,children);}
function btn(attrs,children){return el('button',attrs,children);}
function inp(attrs){return el('input',attrs);}
function card(title,children){
  const d=div({className:'card'},[]);
  if(title)d.appendChild(div({className:'ct'},[title]));
  children.forEach(c=>{if(c)d.appendChild(c);});
  return d;
}
function sl(txt){return div({className:'sl'},[txt]);}
function mbox(label,value,colorClass){
  return div({className:'mbox'},[
    div({className:'mlbl'},[label]),
    div({className:'mval '+colorClass},['\$'+fmt(value)])
  ]);
}
function g3(...items){const d=div({className:'g3'},[]);items.forEach(i=>{if(i)d.appendChild(i);});return d;}
function g2(...items){const d=div({className:'g2'},[]);items.forEach(i=>{if(i)d.appendChild(i);});return d;}
function sep(){return el('hr',{className:'sep'});}
function delBtn(key,onDel){
  const b=btn({className:'delbtn'+(S.armedDel[key]?' armed':''),onClick:e=>{
    e.stopPropagation();
    if(S.armedDel[key]){delete S.armedDel[key];onDel();}
    else{S.armedDel[key]=setTimeout(()=>{delete S.armedDel[key];render();},2500);render();}
  }},[S.armedDel[key]?'確定？':'🗑']);
  return b;
}
function digitInput(value,onChange,small){
  const str=String(value||0),padded=str.padStart(5,'0'),sig=5-str.length;
  const W=small?34:42,H=small?42:52,FS=small?'1.1rem':'1.4rem';
  const wrap=div({className:'dig-wrap'},[]);
  padded.split('').forEach((d,i)=>{
    const on=i>=sig&&value>0;
    const dv=div({className:'dig '+(small?'sm':'lg'),style:{
      width:W+'px',height:H+'px',fontSize:FS,
      background:'#1a2f42',color:on?'#e8f4fd':'#6a8fa8',
      border:'1.5px solid '+(on?'#00d4aa':'#243d55')
    }},[d]);
    wrap.appendChild(dv);
  });
  wrap.appendChild(span({className:'dig-unit'},['元']));
  const hidden=inp({type:'tel',inputMode:'numeric',pattern:'[0-9]*',className:'dig-inp',value:value||''});
  // 輸入中只更新暫存值，不 render（避免焦點跑掉）
  hidden.addEventListener('input',e=>{
    const v=e.target.value.replace(/\D/g,'').slice(0,5);
    const num=v?parseInt(v):0;
    // 即時更新格子顯示（不 render 整頁）
    const newStr=String(num),newPad=newStr.padStart(5,'0'),newSig=5-newStr.length;
    const digs=wrap.querySelectorAll('.dig');
    digs.forEach((dv,i)=>{
      const active=i>=newSig&&num>0;
      dv.textContent=newPad[i];
      dv.style.color=active?'#e8f4fd':'#6a8fa8';
      dv.style.border='1.5px solid '+(active?'#00d4aa':'#243d55');
    });
    hidden._pendingVal=num;
  });
  // blur 時才真正存值並觸發外部 onChange
  hidden.addEventListener('blur',e=>{
    const num=hidden._pendingVal!==undefined?hidden._pendingVal:(e.target.value?parseInt(e.target.value.replace(/\D/g,'').slice(0,5)):0);
    delete hidden._pendingVal;
    onChange(num);
  });
  // 點擊格子區域聚焦隱藏輸入
  wrap.appendChild(hidden);
  wrap.addEventListener('click',()=>hidden.focus());
  return wrap;
}
function typeToggle(cur,onInc,onExp){
  return div({className:'type-tog'},[
    btn({className:'tbtn'+(cur==='income'?' inc':''),onClick:onInc},['＋ 收入']),
    btn({className:'tbtn'+(cur==='expense'?' exp':''),onClick:onExp},['－ 支出']),
  ]);
}
function catGrid(cats,selected,onSelect){
  const g=div({style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'7px',marginBottom:'14px'}},[]);
  cats.forEach(({i,l})=>{
    const c=div({style:{padding:'8px 4px 7px',borderRadius:'10px',textAlign:'center',cursor:'pointer',userSelect:'none',background:selected===l?'rgba(0,212,170,.1)':'#1a2f42',border:'1.5px solid '+(selected===l?'#00d4aa':'#243d55')},onClick:()=>onSelect(l)},[
      div({style:{fontSize:'1.2rem',marginBottom:'2px'}},[i]),
      div({style:{fontSize:'.63rem',color:selected===l?'#00d4aa':'#6a8fa8'}},[l]),
    ]);
    g.appendChild(c);
  });
  return g;
}
function cssBarChart(data){
  if(!data||!data.length)return div({style:{textAlign:'center',padding:'20px 0',color:'#6a8fa8',fontSize:'.85rem'}},['本月尚無資料']);
  const max=Math.max(...data.map(d=>Math.max(d.alloc,d.spent)),1);
  const wrap=div({className:'bar-wrap'},[]);
  const group=div({className:'bar-group'},[]);
  data.forEach(d=>{
    const col=div({className:'bar-col'},[]);
    const bars=div({className:'bar-bars'},[]);
    const bA=div({className:'bar',style:{background:'#4fc3f7',height:Math.max(d.alloc/max*120,2)+'px'}},[]);
    if(d.alloc>0){const lbl=div({className:'bar-lbl',style:{color:'#4fc3f7'}},[d.alloc>=1000?(d.alloc/1000).toFixed(0)+'k':String(d.alloc)]);bA.appendChild(lbl);}
    const bS=div({className:'bar',style:{background:'#f87171',height:Math.max(d.spent/max*120,d.spent>0?2:0)+'px'}},[]);
    if(d.spent>0){const lbl=div({className:'bar-lbl',style:{color:'#f87171'}},[d.spent>=1000?(d.spent/1000).toFixed(0)+'k':String(d.spent)]);bS.appendChild(lbl);}
    bars.appendChild(bA);bars.appendChild(bS);
    col.appendChild(bars);
    col.appendChild(div({style:{fontSize:'.7rem',textAlign:'center'}},[d.icon]));
    col.appendChild(div({style:{fontSize:'.6rem',color:'#6a8fa8',textAlign:'center',overflow:'hidden',whiteSpace:'nowrap',width:'100%'}},[d.name]));
    group.appendChild(col);
  });
  wrap.appendChild(group);
  const legend=div({className:'legend'},[]);
  [['分配','#4fc3f7'],['支出','#f87171']].forEach(([l,col])=>{
    legend.appendChild(div({style:{display:'flex',alignItems:'center',fontSize:'.75rem',color:'#6a8fa8'}},[
      span({style:{display:'inline-block',width:'10px',height:'10px',borderRadius:'2px',background:col,marginRight:'4px'}},[]),l
    ]));
  });
  wrap.appendChild(legend);
  return wrap;
}

// ════ 第一頁：繳納 ══════════════════════════════════════
function page0(){
  const mk=mkey(),mt=monthTotal();
  const target=S.members.reduce((s,m)=>s+m.defaultAmt,0);
  const monthC=S.contribs.filter(c=>c.month===mk);
  const paidMap={};monthC.forEach(c=>{paidMap[c.memberId]=c;});
  const paidAll=monthC.length>=S.members.length;
  const pct=target>0?Math.min(mt/target*100,100):0;
  const cur=isCurrent();

  const wrap=div({},[]);
  if(!cur)wrap.appendChild(readonlyBanner());

  // 總覽卡
  const ov=card(null,[
    g3(mbox('目標',target,'c-g'),mbox('已收',mt,mt>=target?'c-i':'c-e'),
      div({className:'mbox'},[div({className:'mlbl'},['狀態']),div({style:{fontSize:'.82rem',fontWeight:700,color:paidAll?'#2dd4bf':'#ffd166'}},[paidAll?'✅ 完成':'⏳ 待繳'])])
    ),
    div({className:'prog'},[div({className:'prog-fill',style:{width:pct.toFixed(0)+'%'}},[])]),
  ]);
  wrap.appendChild(ov);

  // ── 本月每人繳納金額調整（成員狀況上方）──
  if(cur){
    const ppCard=card('本月每人繳納金額',[]);
    const perPerson = S.members[0]?.defaultAmt || 35000;
    const maxAmt=35000, step=500;
    let curPP=perPerson;

    const row3=div({style:{display:'flex',alignItems:'stretch',gap:'8px',marginBottom:'6px'}},[]);
    const btnS=(col,bg,bdr)=>({width:'54px',minHeight:'52px',borderRadius:'12px',border:'2px solid '+bdr,background:bg,color:col,fontSize:'1.8rem',fontWeight:700,cursor:'pointer',flexShrink:0,userSelect:'none',display:'flex',alignItems:'center',justifyContent:'center'});
    const minusBtn=btn({style:btnS('#e8f4fd','#152536','#243d55')},['−']);
    const plusBtn =btn({style:btnS('#ffd166','rgba(255,209,102,.08)','#ffd166')},['＋']);

// ════ Google Drive 備份 ═════════════════════════════════
function gdriveBackup(){
  const clientId=LS.get('fm_gcid','');
  if(!clientId)return alert('請先設定 Google Client ID');

  // 如果已有有效 token 直接上傳
  if(window._gdToken&&window._gdTokenExp>Date.now()){
    doGdriveUpload(window._gdToken);return;
  }

  // 載入 Google Identity Services
  if(!document.getElementById('gsi-script')){
    window._gdStatus={ok:false,msg:'⏳ 載入 Google 登入中...'};render();
    const s=document.createElement('script');
    s.id='gsi-script';
    s.src='https://accounts.google.com/gsi/client';
    s.onload=()=>requestGdriveToken(clientId);
    s.onerror=()=>{window._gdStatus={ok:false,msg:'❌ 無法載入 Google 服務，請確認網路連線'};render();};
    document.head.appendChild(s);
  } else {
    requestGdriveToken(clientId);
  }
}

function requestGdriveToken(clientId){
  try{
    const client=google.accounts.oauth2.initTokenClient({
      client_id:clientId,
      scope:'https://www.googleapis.com/auth/drive.file',
      callback:resp=>{
        if(resp.error){window._gdStatus={ok:false,msg:'❌ 授權失敗：'+resp.error};render();return;}
        window._gdToken=resp.access_token;
        window._gdTokenExp=Date.now()+(resp.expires_in-60)*1000;
        doGdriveUpload(resp.access_token);
      }
    });
    client.requestAccessToken();
  }catch(e){window._gdStatus={ok:false,msg:'❌ 錯誤：'+e.message};render();}
}

function doGdriveUpload(token){
  window._gdStatus={ok:false,msg:'⏳ 上傳中...'};render();
  const data={members:S.members,contribs:S.contribs,categories:S.categories,allocs:S.allocs,expenses:S.expenses,extras:S.extras,personal:S.personal,exported:now_()};
  const filename='FamiFound_'+now_().slice(0,10)+'.json';
  const content=JSON.stringify(data,null,2);
  const boundary='famifound_boundary';
  const body='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+
    JSON.stringify({name:filename,mimeType:'application/json'})+
    '\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+
    content+'\r\n--'+boundary+'--';
  fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',
    headers:{'Authorization':'Bearer '+token,'Content-Type':'multipart/related; boundary='+boundary},
    body
  }).then(r=>r.json()).then(d=>{
    if(d.id){window._gdStatus={ok:true,msg:'✅ 已備份到 Google Drive：'+filename};}
    else{window._gdStatus={ok:false,msg:'❌ 上傳失敗：'+(d.error&&d.error.message||'未知錯誤')};}
    render();
  }).catch(e=>{window._gdStatus={ok:false,msg:'❌ 網路錯誤：'+e.message};render();});
}

        totalLbl.textContent = '$'+fmt(curPP*memCnt);
        // 更新按鈕狀態
        minusBtn.style.opacity = curPP<=0 ? '0.3':'1';
        plusBtn.style.opacity  = curPP>=maxPP?'0.3':'1';
        saveAlloc(cat.id, curPP*memCnt);
      }

      minusBtn.addEventListener('click',()=>commit(curPP-step));
      plusBtn.addEventListener('click', ()=>commit(curPP+step));
      ppInp.addEventListener('input',e=>{ppInp.value=e.target.value.replace(/\D/g,'').slice(0,5);});
      ppInp.addEventListener('blur', ()=>commit(parseInt(ppInp.value)||0));

      row3.appendChild(minusBtn);
      row3.appendChild(mid);
      row3.appendChild(plusBtn);
      aRow.appendChild(row3);

      // 每步 500 提示
      aRow.appendChild(div({style:{textAlign:'center',fontSize:'.68rem',color:'#6a8fa8',marginTop:'6px'}},['每次 ±$500　×　'+memCnt+' 人']));

      // 初始化按鈕狀態
      minusBtn.style.opacity = initPP<=0?'0.3':'1';
      plusBtn.style.opacity  = initPP>=maxPP?'0.3':'1';

    } else {
      aRow.appendChild(sl('本月分配'));
      aRow.appendChild(div({style:{fontFamily:'monospace',fontSize:'1.3rem',fontWeight:700,
        color:thisA>0?'#4fc3f7':'#6a8fa8',padding:'4px 0'}},['$'+fmt(thisA)]));
    }
    c.appendChild(aRow);

    // 額外收入（唯讀時只顯示列表，不顯示新增按鈕）
    if(catEx.length){
      const exList=div({style:{marginBottom:'10px'}},[]);
      catEx.forEach(ex=>{
        const r=div({style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',background:'#152536',borderRadius:'8px',marginBottom:'5px'}},[]);
        r.appendChild(span({style:{fontSize:'.78rem',color:ex.type==='carryover'?'#4fc3f7':'#2dd4bf',flex:1}},[ex.type==='carryover'?'↩️ 上月結餘':'🎁 '+ex.label]));
        r.appendChild(span({style:{fontFamily:'monospace',fontSize:'.82rem',fontWeight:600,color:ex.type==='carryover'?(ex.amount>=0?'#4fc3f7':'#f87171'):'#2dd4bf'}},[(ex.amount>=0?'+ ':'')+'$'+fmt(ex.amount)]));
        if(cur)r.appendChild(delBtn('extra-'+ex.id,()=>{save('extras',S.extras.filter(x=>x.id!==ex.id));render();}));
        exList.appendChild(r);
      });
      c.appendChild(exList);
    }
    if(cur)c.appendChild(extraRow(cat.id,mk,prevBal,hasHistory,hasCarryover));

    // 小結
    c.appendChild(div({style:{marginTop:'12px'}},[g3(mbox('本月收入',thisA+exSum,'c-i'),mbox('本月支出',thisS,'c-e'),mbox('本月結餘',thisA+exSum-thisS,thisA+exSum-thisS>=0?'c-i':'c-e'))]));
    wrap.appendChild(c);
  });

  // 新增分類
  if(S.allocAddOpen){
    const ac=card(null,[sl('新分類名稱')]);
    const row=div({className:'row'},[]);
    const ni=inp({type:'text',value:S.allocNewName,placeholder:'例：教育、保險…'});
    ni.addEventListener('input',e=>{S.allocNewName=e.target.value;});
    ni.addEventListener('keydown',e=>{if(e.key==='Enter')doAddCat();});
    row.appendChild(ni);
    row.appendChild(btn({className:'btn-g',onClick:doAddCat},['新增']));
    row.appendChild(btn({className:'btn-w',onClick:()=>{S.allocAddOpen=false;render();}},['取消']));
    ac.appendChild(row);
    wrap.appendChild(ac);
    setTimeout(()=>ni.focus(),50);
  } else {
    if(cur)wrap.appendChild(btn({style:{width:'100%',padding:'12px',borderRadius:'11px',border:'1.5px dashed #243d55',background:'none',color:'#6a8fa8',cursor:'pointer',fontSize:'.88rem'},onClick:()=>{S.allocAddOpen=true;S.allocNewName='';render();}},['＋ 新增分類']));
  }
  return wrap;
}
function doAddCat(){
  const nm=S.allocNewName.trim();if(!nm)return;
  save('categories',[...S.categories,{id:uid(),name:nm,icon:CAT_ICONS[S.categories.length%CAT_ICONS.length],defPP:0}]);
  S.allocAddOpen=false;render();
}
function extraRow(catId,mk,prevBal,hasHistory,hasCarryover){
  const key='ex-'+catId;
  if(!S.extraOpen[key]){
    return btn({style:{width:'100%',padding:'7px',borderRadius:'8px',border:'1px dashed #243d55',background:'none',color:'#6a8fa8',cursor:'pointer',fontSize:'.78rem'},onClick:()=>{
      S.extraOpen[key]=true;S.extraMode[key]='carryover';
      render();
      // 展開後滾動到可見區域
      setTimeout(()=>{
        const scr=document.getElementById('scr');
        const els=scr.querySelectorAll('[data-extra-key]');
        els.forEach(el=>{if(el.dataset.extraKey===key)el.scrollIntoView({behavior:'smooth',block:'nearest'});});
      },60);
    }},['＋ 新增額外收入（結餘轉入 / 補助）']);
  }
  const mode=S.extraMode[key]||'carryover';
  const d=div({style:{background:'#152536',borderRadius:'10px',padding:'12px',marginBottom:'4px'},'data-extra-key':key},[]);
  // 模式切換
  const modeRow=div({className:'row',style:{marginBottom:'12px'}},[]);
  [['carryover','↩️ 上月結餘'],['subsidy','🎁 補助/其他']].forEach(([m,l])=>{
    modeRow.appendChild(btn({style:{flex:1,padding:'7px 6px',borderRadius:'8px',textAlign:'center',cursor:'pointer',fontSize:'.78rem',fontWeight:mode===m?700:400,border:'1.5px solid '+(mode===m?'#00d4aa':'#243d55'),background:mode===m?'rgba(0,212,170,.1)':'none',color:mode===m?'#00d4aa':'#6a8fa8',userSelect:'none'},onClick:()=>{S.extraMode[key]=m;render();}},[ l ]));
  });
  d.appendChild(modeRow);

  if(mode==='carryover'){
    if(hasCarryover){
      d.appendChild(div({style:{fontSize:'.8rem',color:'#6a8fa8',textAlign:'center',padding:'6px 0'}},['本月已新增上月結餘']));
    } else if(hasHistory){
      d.appendChild(div({style:{fontSize:'.8rem',color:'#6a8fa8',marginBottom:'10px'}},['系統計算上月結餘：\$'+fmt(prevBal)+(prevBal<=0?' （赤字）':'')]));
      if(prevBal>0){
        d.appendChild(btn({className:'btn-g',style:{width:'100%'},onClick:()=>{
          save('extras',[...S.extras,{id:uid(),catId,month:mk,type:'carryover',label:'上月結餘',amount:prevBal}]);
          delete S.extraOpen[key];render();
        }},['確認轉入 $'+fmt(prevBal)]));
      } else {
        d.appendChild(btn({className:'btn-w',style:{width:'100%'},onClick:()=>{delete S.extraOpen[key];render();}},['關閉']));
      }
    } else {
      d.appendChild(div({style:{fontSize:'.78rem',color:'#6a8fa8',marginBottom:'8px'}},['首次使用，請輸入上月結餘（負數代表負債）：']));
      const manInp=inp({type:'text',inputMode:'decimal',placeholder:'例：12000 或 -3500',style:{marginBottom:'8px',fontSize:'1rem',fontWeight:700,color:'#e8f4fd',textAlign:'center',letterSpacing:'2px'}});
      manInp.addEventListener('input',e=>{
        // 只允許數字和負號
        let v=e.target.value.replace(/[^\d\-]/g,'');
        if(v.indexOf('-')>0)v=v.replace(/-/g,'');
        manInp.value=v;
      });
      d.appendChild(manInp);
      const r=div({className:'row',style:{marginTop:'4px'}},[]);
      r.appendChild(btn({className:'btn-g',onClick:()=>{
        const raw=manInp.value.trim();
        const a=raw===''?null:parseInt(raw);
        if(a===null||isNaN(a)){manInp.focus();manInp.style.border='1px solid #f87171';return;}
        manInp.style.border='';
        save('extras',[...S.extras,{id:uid(),catId,month:mk,type:'carryover',label:'上月結餘',amount:a}]);
        delete S.extraOpen[key];render();
      }},['確認']));
      r.appendChild(btn({className:'btn-w',onClick:()=>{delete S.extraOpen[key];render();}},['取消']));
      d.appendChild(r);
    }
  } else {
    // ── 補助 / 其他 ──
    const catName=(S.categories.find(c=>c.id===catId)||{name:''}).name;
    const placeholders={
      '家用':'水電補助、節能補貼…','小孩':'育兒津貼、托育補助…',
      '旅遊':'旅遊補助、員工福利…','汽車':'車牌補助、電動車補貼…',
      '房子':'購屋補貼、租金補助…','其他':'政府補助、獎勵金…',
    };
    const ph=placeholders[catName]||'補助名稱…';

    // 名稱輸入
    const ni=inp({type:'text',placeholder:ph,style:{marginBottom:'10px'}});
    d.appendChild(div({},[sl('補助名稱'),ni]));

    // 金額輸入
    const ai=inp({type:'tel',inputMode:'numeric',placeholder:'金額（元）',style:{fontSize:'1.1rem',fontWeight:700,letterSpacing:'2px',textAlign:'center',marginBottom:'12px'}});
    ai.addEventListener('input',e=>{ai.value=e.target.value.replace(/\D/g,'').slice(0,6);});
    d.appendChild(div({},[sl('金額'),ai]));

    // 按鈕：直接讀 DOM value，不依賴 S
    const r=div({className:'row'},[]);
    r.appendChild(btn({className:'btn-g',onClick:()=>{
      const a=parseInt(ai.value)||0;
      const l=ni.value.trim();
      if(!l){ni.focus();ni.style.border='1px solid #f87171';return;}
      if(!a){ai.focus();ai.style.border='1px solid #f87171';return;}
      ni.style.border='';ai.style.border='';
      save('extras',[...S.extras,{id:uid(),catId,month:mk,type:'subsidy',label:l,amount:a}]);
      delete S.extraOpen[key];render();
    }},['✓ 新增']));
    r.appendChild(btn({className:'btn-w',onClick:()=>{delete S.extraOpen[key];render();}},['取消']));
    d.appendChild(r);
  }
  return d;
}

// ════ 第三頁：記帳 ══════════════════════════════════════
function page2(){
  const mk=mkey();
  const monthExps=[...S.expenses.filter(e=>e.date.startsWith(mk))].reverse();
  const cur=isCurrent();
  // 編輯中的記錄 id（null = 新增模式）
  if(!S._editExpId)S._editExpId=null;
  const editRec=S._editExpId?S.expenses.find(e=>e.id===S._editExpId):null;
  const chartData=S.categories.map(cat=>({
    name:cat.name,icon:cat.icon,
    alloc:(S.allocs.find(a=>a.catId===cat.id&&a.month===mk)||{amount:0}).amount,
    spent:S.expenses.filter(e=>e.catId===cat.id&&e.date.startsWith(mk)).reduce((s,e)=>s+e.amount,0),
  })).filter(d=>d.alloc>0||d.spent>0);

  const wrap=div({},[]);
  if(!cur)wrap.appendChild(readonlyBanner());

  // 新增表單（唯讀時隱藏）
  if(cur){
  // 編輯模式時，第一次進入才預填（之後 render 不覆蓋使用者的選擇）
  if(editRec && S._editExpId !== S._editExpIdPrev){
    S.ledgerCat=editRec.catId;
    S.ledgerType=editRec.subCat;
    S._editExpIdPrev=S._editExpId;
  }
  const fc=card(editRec?'✏️ 修改記錄':'新增支出',[]);
  if(editRec){
    fc.style.border='1.5px solid #ffd166';
  }

  // ── 分類 ──
  fc.appendChild(sl('支出分類'));
  const chipWrap=div({style:{display:'flex',flexWrap:'wrap',gap:'7px',marginBottom:'14px'}},[]);
  S.categories.forEach(cat=>{
    const c=div({className:'chip'+(S.ledgerCat===cat.id?' on':''),onClick:()=>{S.ledgerCat=cat.id;render();}},[cat.icon,' ',cat.name]);
    chipWrap.appendChild(c);
  });
  fc.appendChild(chipWrap);

  // ── 消費項目 ──
  fc.appendChild(sl('消費項目'));
  const typeGrid=div({style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'7px',marginBottom:'14px'}},[]);
  EXP_TYPES.forEach(({i,l})=>{
    const c=div({style:{padding:'8px 4px 7px',borderRadius:'10px',textAlign:'center',cursor:'pointer',userSelect:'none',background:S.ledgerType===l?'rgba(0,212,170,.1)':'#1a2f42',border:'1.5px solid '+(S.ledgerType===l?'#00d4aa':'#243d55')},onClick:()=>{S.ledgerType=l;render();}},[ div({style:{fontSize:'1.2rem',marginBottom:'2px'}},[i]), div({style:{fontSize:'.63rem',color:S.ledgerType===l?'#00d4aa':'#6a8fa8'}},[l]) ]);
    typeGrid.appendChild(c);
  });
  fc.appendChild(typeGrid);

  // ── 日期（預設今日，可往前調整）──
  const todayStr=(()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());})();
  const initDateStr=editRec?editRec.date.slice(0,10):todayStr;
  fc.appendChild(sl('日期'));
  const dateInp=inp({type:'date',value:initDateStr,max:todayStr,
    style:{fontSize:'.95rem',fontWeight:600,textAlign:'center',marginBottom:'10px',color:'#e8f4fd',background:'#152536',border:'2px solid #243d55',borderRadius:'9px',padding:'9px 12px'}});
  dateInp.addEventListener('focus',()=>{dateInp.style.border='2px solid #00d4aa';});
  dateInp.addEventListener('blur', ()=>{dateInp.style.border='2px solid #243d55';});
  fc.appendChild(dateInp);

  // ── 金額（計算機模式）──
  fc.appendChild(sl('金額'));
  let calcExpr=editRec?String(editRec.amount):'';
  const calcDisp=div({style:{fontFamily:'monospace',fontSize:'1.3rem',fontWeight:700,textAlign:'right',padding:'10px 14px',background:'#0d1f2d',borderRadius:'10px',marginBottom:'4px',minHeight:'50px',color:'#e8f4fd',wordBreak:'break-all'}},[editRec?'$'+fmt(editRec.amount):'0']);
  const calcSub=div({style:{fontFamily:'monospace',fontSize:'.78rem',textAlign:'right',padding:'0 14px 8px',color:'#6a8fa8',minHeight:'20px'}},['']);
  fc.appendChild(calcDisp);
  fc.appendChild(calcSub);

  const getCalcAmt=()=>{
    try{const s=calcExpr.replace(/[^0-9+\-*/().]/g,'');if(!s)return 0;return Math.round(Function('"use strict";return('+s+')')())||0;}catch(e){return 0;}
  };
  const calcUpdate=()=>{
    if(!calcExpr){calcDisp.textContent='0';calcSub.textContent='';updateBtn();return;}
    calcDisp.textContent=calcExpr;
    try{
      const s=calcExpr.replace(/[^0-9+\-*/().]/g,'');
      const r=Function('"use strict";return('+s+')')();
      calcSub.textContent=(isFinite(r)&&calcExpr.match(/[+\-*/]/))?'= $'+Number(Math.round(r)).toLocaleString('zh-TW'):'';
    }catch(e){calcSub.textContent='';}
    updateBtn();
  };
  const calcPress=k=>{
    if(k==='C'){calcExpr='';calcUpdate();return;}
    if(k==='⌫'){calcExpr=calcExpr.slice(0,-1);calcUpdate();return;}
    if(k==='='){
      const r=getCalcAmt();
      if(r){calcExpr=String(r);calcDisp.textContent='$'+Number(r).toLocaleString('zh-TW');calcSub.textContent='';}
      updateBtn();return;
    }
    if(['+','-','×','÷'].includes(k)&&['+','-','×','÷'].includes(calcExpr.slice(-1)))
      calcExpr=calcExpr.slice(0,-1);
    const opMap={'×':'*','÷':'/'};
    calcExpr+=(opMap[k]||k);
    calcUpdate();
  };
  const keys=[['7','8','9','+'],[' 4','5','6','-'],['1','2','3','×'],['C','0','⌫','=']];
  const keyBg={'+':'#2a4060','-':'#2a4060','×':'#2a4060','÷':'#2a4060','=':'#00d4aa','C':'rgba(248,113,113,.2)','⌫':'#2a4060'};
  const keyCl={'=':'#0d1f2d','C':'#f87171'};
  const keypad=div({style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px',marginBottom:'10px'}},[]);
  [['7','8','9','+'],[' 4','5','6','-'],['1','2','3','×'],['C','0','⌫','=']].forEach(row=>row.forEach(k=>{
    const kk=k.trim();
    keypad.appendChild(btn({style:{padding:'15px 4px',borderRadius:'10px',border:'none',background:keyBg[kk]||'#152536',color:keyCl[kk]||'#e8f4fd',fontSize:kk==='⌫'?'1.1rem':'1.2rem',fontWeight:700,cursor:'pointer',userSelect:'none'},onClick:()=>calcPress(kk)},[kk]));
  }));
  fc.appendChild(keypad);

  // ── 備註 ──
  const ni=inp({type:'text',value:editRec?editRec.note||'':S.ledgerNote||'',placeholder:'備註（可留空）',style:{marginBottom:'12px'}});
  ni.addEventListener('input',e=>{S.ledgerNote=e.target.value;});
  fc.appendChild(ni);

  // ── 按鈕 ──
  if(editRec){
    // 編輯模式：取消 + 確認修改
    const btnRow=div({style:{display:'flex',gap:'8px'}},[]);
    btnRow.appendChild(btn({className:'btn-w',style:{flex:1,padding:'12px',borderRadius:'10px',fontSize:'.92rem'},onClick:()=>{
      S._editExpId=null;S._editExpIdPrev=null;S.ledgerCat=null;S.ledgerType=null;render();
    }},['✕ 取消']));
    const saveEditBtn=btn({className:'btn',style:{flex:2,padding:'12px',borderRadius:'10px',fontSize:'.92rem'},onClick:()=>{
      const cat=S.categories.find(c=>c.id===S.ledgerCat);
      const typ=EXP_TYPES.find(t=>t.l===S.ledgerType);
      const a=getCalcAmt();
      if(!cat||!typ||!a)return;
      const dateVal=dateInp.value||todayStr;
      const timeStr=dateVal===initDateStr?editRec.date:dateVal+' 00:00';
      save('expenses',S.expenses.map(e=>e.id===S._editExpId?{...e,catId:S.ledgerCat,catName:cat.name,catIcon:cat.icon,subCat:S.ledgerType,subIcon:typ.i,amount:a,note:ni.value.trim(),date:timeStr}:e));
      S._editExpId=null;S._editExpIdPrev=null;S.ledgerCat=null;S.ledgerType=null;S.ledgerAmt=0;S.ledgerNote='';render();
    }},['✓ 確認修改']);
    btnRow.appendChild(saveEditBtn);
    fc.appendChild(btnRow);
  } else {
    const submitBtn=btn({className:'btn btn-dis',onClick:()=>{
      const cat=S.categories.find(c=>c.id===S.ledgerCat);
      const typ=EXP_TYPES.find(t=>t.l===S.ledgerType);
      const a=getCalcAmt();
      if(!cat){showHint(fc,'請選擇支出分類');return;}
      if(!typ){showHint(fc,'請選擇消費項目');return;}
      if(!a){calcDisp.style.outline='2px solid #f87171';setTimeout(()=>calcDisp.style.outline='',1500);return;}
      calcDisp.style.outline='';
      const dateVal=dateInp.value||todayStr;
      const timeStr=dateVal===todayStr?now_():dateVal+' 00:00';
      save('expenses',[...S.expenses,{id:uid(),catId:S.ledgerCat,catName:cat.name,catIcon:cat.icon,subCat:S.ledgerType,subIcon:typ.i,amount:a,note:ni.value.trim(),date:timeStr}]);
      S.ledgerCat=null;S.ledgerType=null;S.ledgerAmt=0;S.ledgerNote='';calcExpr='';render();
    }},['記錄支出 ✓']);
    fc.appendChild(submitBtn);
  }
  wrap.appendChild(fc);

  // 計算機按下時更新按鈕狀態（分類/項目點擊直接 render，不需要這裡處理）
  function updateBtn(){
    if(editRec)return;
    const a=getCalcAmt();
    const ok=S.ledgerCat&&S.ledgerType&&a>0;
    const sb=fc.querySelector('button.btn, button.btn-dis');
    if(sb){sb.className='btn'+(ok?'':' btn-dis');sb.textContent=ok?'記錄支出 ✓':'記錄支出';}
  }
  function showHint(parent,msg){
    let h=parent.querySelector('.form-hint');
    if(!h){h=document.createElement('div');h.className='form-hint';h.style.cssText='font-size:.78rem;color:#f87171;text-align:center;margin-bottom:8px;';parent.insertBefore(h,submitBtn);}
    h.textContent=msg;
    setTimeout(()=>{if(h.parentNode)h.textContent='';},2000);
  }

  } // end if(cur)

  if(monthExps.length){
    // ── 排序 ──
    if(!S._expSort)S._expSort='date_desc';
    const sortedExps=()=>{
      const arr=[...monthExps];
      if(S._expSort==='date_asc')
        return arr.sort((a,b)=>a.date.localeCompare(b.date));
      if(S._expSort==='date_desc')
        return arr.sort((a,b)=>b.date.localeCompare(a.date));
      if(S._expSort==='cat')return arr.sort((a,b)=>{
        const cm=a.catName.localeCompare(b.catName,'zh-TW');
        if(cm!==0)return cm;
        return a.subCat.localeCompare(b.subCat,'zh-TW');
      });
      return arr;
    };

    const mc=card(null,[]);
    const sortRow=div({style:{display:'flex',gap:'6px',marginBottom:'12px',alignItems:'center'}},[]);

    // 日期切換鈕（一顆，箭頭指示方向）
    const dateBtn=btn({style:{padding:'6px 12px',borderRadius:'20px',border:'1.5px solid '+(S._expSort!=='cat'?'#00d4aa':'#243d55'),background:S._expSort!=='cat'?'rgba(0,212,170,.1)':'none',color:S._expSort!=='cat'?'#00d4aa':'#6a8fa8',fontSize:'.75rem',fontWeight:S._expSort!=='cat'?700:400,cursor:'pointer',whiteSpace:'nowrap'},onClick:()=>{
      if(S._expSort==='cat')S._expSort='date_desc';
      else S._expSort=S._expSort==='date_desc'?'date_asc':'date_desc';
      render();
    }},['📅 日期 '+(S._expSort==='date_asc'?'↑':'↓')]);
    sortRow.appendChild(dateBtn);

    // 分類鈕
    const on=S._expSort==='cat';
    sortRow.appendChild(btn({style:{padding:'6px 12px',borderRadius:'20px',border:'1.5px solid '+(on?'#00d4aa':'#243d55'),background:on?'rgba(0,212,170,.1)':'none',color:on?'#00d4aa':'#6a8fa8',fontSize:'.75rem',fontWeight:on?700:400,cursor:'pointer',whiteSpace:'nowrap'},onClick:()=>{S._expSort='cat';render();}},['🗂 分類']));

    // 筆數小計
    const tot=monthExps.reduce((s,e)=>s+e.amount,0);
    sortRow.appendChild(div({style:{marginLeft:'auto',fontSize:'.75rem',color:'#6a8fa8',whiteSpace:'nowrap'}},['共 '+monthExps.length+' 筆　$'+fmt(tot)]));
    mc.appendChild(sortRow);

    // 明細列
    sortedExps().forEach((e,i,arr)=>{
      // 分類排序時，顯示分類群組標頭
      if(S._expSort==='cat'){
        const prev=arr[i-1];
        if(!prev||prev.catName!==e.catName){
          const grpHdr=div({style:{display:'flex',alignItems:'center',gap:'6px',padding:'8px 0 4px',borderBottom:'1px solid #243d55',marginBottom:'4px'}},[
            span({style:{fontSize:'1rem'}},[e.catIcon]),
            span({style:{fontSize:'.82rem',fontWeight:700,color:'#4fc3f7'}},[e.catName]),
            span({style:{fontSize:'.72rem',color:'#6a8fa8',marginLeft:'auto'}},['$'+fmt(arr.filter(x=>x.catName===e.catName).reduce((s,x)=>s+x.amount,0))])
          ]);
          mc.appendChild(grpHdr);
        }
      }
      const r=div({className:'rec'},[]);
      r.appendChild(div({style:{width:'34px',height:'34px',borderRadius:'50%',background:'#152536',border:'1px solid #243d55',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',flexShrink:0}},[e.subIcon]));
      const b=div({style:{flex:1,minWidth:0,cursor:'pointer'},onClick:()=>{
        if(!cur)return;
        S._editExpId=e.id;S._editExpIdPrev=null;S.ledgerCat=null;S.ledgerType=null;
        render();
        setTimeout(()=>document.getElementById('scr').scrollTo({top:0,behavior:'smooth'}),60);
      }},[]);
      const editing=S._editExpId===e.id;
      b.style.background=editing?'rgba(255,209,102,.06)':'';
      b.style.borderRadius=editing?'8px':'';
      b.style.padding=editing?'4px 6px':'';
      b.appendChild(div({className:'row-sb'},[
        span({style:{fontSize:'.85rem',fontWeight:500,color:editing?'#ffd166':'inherit'}},[e.catIcon+e.catName+' › '+e.subCat]),
        span({style:{fontFamily:'monospace',fontWeight:700,color:'#f87171',flexShrink:0}},['−$'+fmt(e.amount)])
      ]));
      b.appendChild(div({style:{fontSize:'.69rem',color:'#6a8fa8',marginTop:'3px'}},[e.date.slice(5,16)+(e.note?' · '+e.note:'')+(cur?' ✏️':'')]));
      r.appendChild(b);
      if(cur)r.appendChild(delBtn('exp-'+e.id,()=>{save('expenses',S.expenses.filter(ex=>ex.id!==e.id));render();}));
      mc.appendChild(r);
    });
    wrap.appendChild(mc);
  }

  // ── 長條圖 ──
  wrap.appendChild(card('本月分配 vs 支出',[cssBarChart(chartData)]));

  // ── 差額表 ──
  if(chartData.length){
    const diffCard=card('分配 vs 支出 差額',[]);
    const hdr=div({style:{display:'grid',gridTemplateColumns:'1fr 80px 80px 80px',gap:'4px',padding:'4px 0',borderBottom:'1px solid #243d55',marginBottom:'6px'}},[]);
    ['類別','分配','支出','差額'].forEach((h,i)=>hdr.appendChild(div({style:{fontSize:'.68rem',color:'#6a8fa8',textAlign:i===0?'left':'right'}},[h])));
    diffCard.appendChild(hdr);
    chartData.forEach(d=>{
      const diff=d.alloc-d.spent;
      const row=div({style:{display:'grid',gridTemplateColumns:'1fr 80px 80px 80px',gap:'4px',padding:'6px 0',borderBottom:'1px solid rgba(36,61,85,.4)'}},[]);
      row.appendChild(div({style:{fontSize:'.82rem',display:'flex',alignItems:'center',gap:'4px'}},[d.icon,' ',d.name]));
      row.appendChild(div({style:{fontFamily:'monospace',fontSize:'.78rem',textAlign:'right',color:'#4fc3f7'}},['$'+fmt(d.alloc)]));
      row.appendChild(div({style:{fontFamily:'monospace',fontSize:'.78rem',textAlign:'right',color:'#f87171'}},['$'+fmt(d.spent)]));
      row.appendChild(div({style:{fontFamily:'monospace',fontSize:'.78rem',textAlign:'right',color:diff>=0?'#2dd4bf':'#f87171',fontWeight:700}},[(diff>=0?'+':'−')+'$'+fmt(Math.abs(diff))]));
      diffCard.appendChild(row);
    });
    const totA=chartData.reduce((s,d)=>s+d.alloc,0);
    const totS=chartData.reduce((s,d)=>s+d.spent,0);
    const totD=totA-totS;
    const totRow=div({style:{display:'grid',gridTemplateColumns:'1fr 80px 80px 80px',gap:'4px',padding:'8px 0 2px',marginTop:'4px',borderTop:'1px solid #243d55'}},[]);
    totRow.appendChild(div({style:{fontSize:'.82rem',fontWeight:700,color:'#e8f4fd'}},['合計']));
    totRow.appendChild(div({style:{fontFamily:'monospace',fontSize:'.8rem',textAlign:'right',color:'#4fc3f7',fontWeight:700}},['$'+fmt(totA)]));
    totRow.appendChild(div({style:{fontFamily:'monospace',fontSize:'.8rem',textAlign:'right',color:'#f87171',fontWeight:700}},['$'+fmt(totS)]));
    totRow.appendChild(div({style:{fontFamily:'monospace',fontSize:'.8rem',textAlign:'right',color:totD>=0?'#2dd4bf':'#f87171',fontWeight:700}},[(totD>=0?'+':'−')+'$'+fmt(Math.abs(totD))]));
    diffCard.appendChild(totRow);
    wrap.appendChild(diffCard);
  }

  // ── 截圖區塊（隱藏，Canvas 直接從資料繪製不依賴此 DOM）──
  const shotZone = div({id:'shot-zone',style:{display:'none'}},[]);
  wrap.appendChild(shotZone);

  // ── 截圖分享按鈕（Canvas 自繪）──
  if(monthExps.length){
    const shareBtn=btn({style:{width:'100%',padding:'12px',marginTop:'8px',borderRadius:'10px',border:'none',background:'linear-gradient(135deg,#6366f1,#8b5cf6)',color:'#fff',fontSize:'.92rem',fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}},['📸 截圖分享']);
    shareBtn.addEventListener('click',async()=>{
      shareBtn.textContent='⏳ 截圖中…';shareBtn.disabled=true;
      try{
        const W=750, DPR=1.5;
        const PAD=28, CARD_R=10;
        const TITLE_H=60, ROW_H=58, SEP=12, CHART_H=220;
        const DIFF_HDR=50, DIFF_ROW=42, DIFF_FOOT=80;
        const SECTION_GAP=16;
        // 高度加 60 確保合計不被截
        let H = PAD + TITLE_H
          + ROW_H*monthExps.length + SEP
          + SECTION_GAP + CHART_H + SEP + 20
          + SECTION_GAP + DIFF_HDR + DIFF_ROW*chartData.length + DIFF_FOOT
          + PAD + 60;

        const cv=document.createElement('canvas');
        cv.width=W*DPR; cv.height=H*DPR;
        const cx=cv.getContext('2d');
        cx.scale(DPR,DPR);
        cx.fillStyle='#0d1f2d'; cx.fillRect(0,0,W,H);

        const T=(s,x,y,sz,col,align='left',bold=false)=>{
          cx.font=(bold?'bold ':'')+sz+'px system-ui,sans-serif';
          cx.fillStyle=col; cx.textAlign=align;
          cx.fillText(String(s),x,y);
        };
        const LINE=(x1,y1,x2,y2,col,a=1)=>{
          cx.save();cx.globalAlpha=a;cx.strokeStyle=col;cx.lineWidth=1;
          cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();cx.restore();
        };
        const RECT=(x,y,w,h,r,col)=>{
          cx.fillStyle=col;cx.beginPath();
          cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);
          cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);
          cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);
          cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);
          cx.closePath();cx.fill();
        };

        let y=PAD;
        T('📊  '+S.yr+'/'+S.mo+'月  支出明細',W/2,y+36,22,'#6a8fa8','center');
        y+=TITLE_H;
        LINE(PAD,y,W-PAD,y,'#243d55');

        monthExps.forEach(e=>{
          y+=10;
          RECT(PAD,y,42,42,21,'#152536');
          T(e.subIcon,PAD+21,y+28,18,'#fff','center');
          T(e.catIcon+e.catName+' › '+e.subCat,PAD+52,y+18,15,'#e8f4fd','left',true);
          T(e.date.slice(5,16)+(e.note?' · '+e.note:''),PAD+52,y+36,11,'#6a8fa8');
          T('−$'+fmt(e.amount),W-PAD,y+22,16,'#f87171','right',true);
          y+=ROW_H;
          LINE(PAD,y,W-PAD,y,'#243d55',0.4);
        });
        y+=SECTION_GAP;

        RECT(PAD/2,y,W-PAD,CHART_H+44,CARD_R,'#1a2f42');
        T('本月分配 vs 支出',PAD+4,y+20,13,'#6a8fa8');
        y+=32;
        if(chartData.length){
          const bAreaW=W-PAD*2-16, bAreaH=CHART_H-28;
          const bX=PAD+8, bY=y+16;
          const maxV=Math.max(...chartData.map(d=>Math.max(d.alloc,d.spent)),1);
          const grpW=bAreaW/chartData.length, bW=Math.min(grpW*0.28,28);
          chartData.forEach((d,i)=>{
            const gx=bX+i*grpW+grpW/2;
            const aH=d.alloc/maxV*bAreaH;
            RECT(gx-bW-2,bY+bAreaH-aH,bW,Math.max(aH,2),3,'#4fc3f7');
            if(d.alloc>0)T(d.alloc>=1000?Math.round(d.alloc/1000)+'k':String(d.alloc),gx-bW/2-2,bY+bAreaH-aH-5,10,'#4fc3f7','center');
            const sH=d.spent/maxV*bAreaH;
            if(d.spent>0){
              RECT(gx+2,bY+bAreaH-sH,bW,Math.max(sH,2),3,'#f87171');
              T(d.spent>=1000?Math.round(d.spent/1000)+'k':String(d.spent),gx+bW/2+2,bY+bAreaH-sH-5,10,'#f87171','center');
            }
            T(d.icon,gx,bY+bAreaH+18,14,'#e8f4fd','center');
            T(d.name,gx,bY+bAreaH+32,10,'#6a8fa8','center');
          });
          RECT(W-120,y+CHART_H,12,12,2,'#4fc3f7');T('分配',W-104,y+CHART_H+10,11,'#6a8fa8');
          RECT(W-72,y+CHART_H,12,12,2,'#f87171'); T('支出',W-56,y+CHART_H+10,11,'#6a8fa8');
        }
        y+=CHART_H+12+SECTION_GAP+20;

        const diffCardH=DIFF_HDR+DIFF_ROW*chartData.length+DIFF_FOOT;
        RECT(PAD/2,y,W-PAD,diffCardH,CARD_R,'#1a2f42');
        T('分配 vs 支出  差額',PAD+4,y+22,13,'#6a8fa8');
        y+=DIFF_HDR;
        const C0=PAD+8, C1=W-PAD-8, C2=W-PAD-8-90, C3=W-PAD-8-180;
        T('類別',C0,y,12,'#6a8fa8');
        T('分配',C3,y,12,'#6a8fa8','right');
        T('支出',C2,y,12,'#6a8fa8','right');
        T('差額',C1,y,12,'#6a8fa8','right');
        y+=6; LINE(PAD,y,W-PAD,y,'#243d55',0.7); y+=DIFF_ROW-16;
        chartData.forEach(d=>{
          const diff=d.alloc-d.spent;
          T(d.icon+' '+d.name,C0,y,14,'#e8f4fd');
          T('$'+fmt(d.alloc),C3,y,13,'#4fc3f7','right');
          T('$'+fmt(d.spent),C2,y,13,'#f87171','right');
          T((diff>=0?'+':'−')+'$'+fmt(Math.abs(diff)),C1,y,13,diff>=0?'#2dd4bf':'#f87171','right',true);
          y+=DIFF_ROW;
          LINE(PAD,y-12,W-PAD,y-12,'#243d55',0.25);
        });
        const totA=chartData.reduce((s,d)=>s+d.alloc,0);
        const totS=chartData.reduce((s,d)=>s+d.spent,0);
        const totD=totA-totS;
        LINE(PAD,y-4,W-PAD,y-4,'#243d55',0.8);
        y+=16;
        T('合計',C0,y,15,'#e8f4fd',undefined,true);
        T('$'+fmt(totA),C3,y,14,'#4fc3f7','right',true);
        T('$'+fmt(totS),C2,y,14,'#f87171','right',true);
        T((totD>=0?'+':'−')+'$'+fmt(Math.abs(totD)),C1,y,14,totD>=0?'#2dd4bf':'#f87171','right',true);

        // ── 產生 Blob → objectURL（最可靠的儲存方式）──
        const fname='FamiFound_'+S.yr+pad(S.mo)+'.png';

        // 先用 toDataURL 做預覽（快速），再用 toBlob 做儲存/分享
        const dataUrl=cv.toDataURL('image/png');
        if(!dataUrl||dataUrl==='data:,'){throw new Error('Canvas 繪製失敗');}

        // ── 預覽 Modal ──
        const overlay=document.createElement('div');
        overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:flex;flex-direction:column;overflow:hidden;';

        // 關閉
        const topBar=document.createElement('div');
        topBar.style.cssText='display:flex;gap:8px;padding:10px 12px;flex-shrink:0;background:#111;';

        const closeBtn2=document.createElement('button');
        closeBtn2.textContent='✕ 關閉';
        closeBtn2.style.cssText='flex:1;padding:10px;border-radius:8px;border:1px solid #444;background:none;color:#aaa;font-size:.88rem;font-weight:700;cursor:pointer;';
        closeBtn2.onclick=()=>document.body.removeChild(overlay);

        // 儲存按鈕（直接用 dataUrl，保持在 user gesture 內）
        const saveBtn=document.createElement('button');
        saveBtn.textContent='💾 儲存圖片';
        saveBtn.style.cssText='flex:1;padding:10px;border-radius:8px;border:none;background:#2dd4bf;color:#0d1f2d;font-size:.88rem;font-weight:700;cursor:pointer;';
        saveBtn.onclick=()=>{
          const a=document.createElement('a');
          a.href=dataUrl;
          a.download=fname;
          document.body.appendChild(a);
          a.click();
          setTimeout(()=>a.remove(),200);
        };

        // 分享按鈕
        const shareBtn2=document.createElement('button');
        shareBtn2.textContent='📤 分享';
        shareBtn2.style.cssText='flex:1;padding:10px;border-radius:8px;border:none;background:#6366f1;color:#fff;font-size:.88rem;font-weight:700;cursor:pointer;';
        shareBtn2.onclick=async()=>{
          try{
            // base64 → Uint8Array（同步，保持 user gesture）
            const b64=dataUrl.split(',')[1];
            const bin=atob(b64);
            const arr=new Uint8Array(bin.length);
            for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
            const blob=new Blob([arr],{type:'image/png'});
            const file=new File([blob],fname,{type:'image/png'});
            if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
              await navigator.share({files:[file],title:S.yr+'/'+S.mo+'月支出'});
            } else {
              // 沒有 share API → 開新分頁顯示圖片讓使用者長按儲存
              const w=window.open();
              if(w){w.document.write('<img src="'+dataUrl+'" style="max-width:100%">');w.document.close();}
              else{const a=document.createElement('a');a.href=dataUrl;a.download=fname;a.click();}
            }
          }catch(e){if(e.name!=='AbortError')alert('分享失敗：'+e.message);}
        };

        topBar.appendChild(closeBtn2);
        topBar.appendChild(saveBtn);
        topBar.appendChild(shareBtn2);
        overlay.appendChild(topBar);

        const hint=document.createElement('div');
        hint.textContent='💾 儲存 = 存到下載資料夾　📤 分享 = 傳送給他人';
        hint.style.cssText='text-align:center;font-size:.72rem;color:#666;padding:6px 0 4px;flex-shrink:0;background:#111;';
        overlay.appendChild(hint);

        const imgWrap=document.createElement('div');
        imgWrap.style.cssText='flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 20px;';
        const previewImg=document.createElement('img');
        previewImg.src=dataUrl;
        previewImg.style.cssText='width:100%;border-radius:8px;display:block;';
        imgWrap.appendChild(previewImg);
        overlay.appendChild(imgWrap);
        document.body.appendChild(overlay);

      }catch(err){
        console.error(err);alert('截圖失敗：'+err.message);
      }finally{
        shareBtn.textContent='📸 截圖分享';shareBtn.disabled=false;
      }
    });
    wrap.appendChild(shareBtn);
  }

  return wrap;
}

// ════ 第四頁：總計 ══════════════════════════════════════
function page3(){
  const rows=S.categories.map(cat=>{
    const ta=S.allocs.filter(a=>a.catId===cat.id).reduce((s,a)=>s+a.amount,0);
    const ts=S.expenses.filter(e=>e.catId===cat.id).reduce((s,e)=>s+e.amount,0);
    return {cat,ta,ts,bal:ta-ts};
  });
  const gta=rows.reduce((s,r)=>s+r.ta,0),gts=rows.reduce((s,r)=>s+r.ts,0);
  const c=card('各類別累計至今',[]);
  rows.forEach(({cat,ta,ts,bal})=>{
    const r=div({style:{padding:'13px 0',borderBottom:'1px solid #243d55'}},[]);
    const th=div({className:'row-sb',style:{marginBottom:'10px'}},[span({style:{display:'flex',alignItems:'center',gap:'8px'}},[span({style:{fontSize:'1.2rem'}},[cat.icon]),span({style:{fontWeight:700,fontSize:'.93rem'}},[cat.name])]),span({style:{fontFamily:'monospace',fontWeight:700,color:bal>=0?'#2dd4bf':'#f87171'}},[(bal>=0?'':'−')+'$'+fmt(Math.abs(bal))])]);
    r.appendChild(th);
    r.appendChild(g3(mbox('累計分配',ta,'c-b'),mbox('累計支出',ts,'c-e'),mbox('結餘',bal,bal>=0?'c-i':'c-e')));
    if(ta>0){
      const p=div({style:{height:'6px',background:'#243d55',borderRadius:'3px',overflow:'hidden',marginTop:'8px'}},[div({style:{height:'100%',width:Math.min(ts/ta*100,100).toFixed(0)+'%',background:ts>ta?'#f87171':'#00d4aa',borderRadius:'3px'}},[])  ]);
      r.appendChild(p);
    }
    c.appendChild(r);
  });
  const foot=div({style:{paddingTop:'14px'}},[]);
  foot.appendChild(div({className:'row-sb',style:{marginBottom:'10px'}},[span({style:{fontWeight:700}},['全部合計']),span({style:{fontFamily:'monospace',fontWeight:700,fontSize:'1rem',color:gta-gts>=0?'#2dd4bf':'#f87171'}},[(gta-gts>=0?'':'−')+'$'+fmt(Math.abs(gta-gts))])]));
  foot.appendChild(g3(mbox('總分配',gta,'c-b'),mbox('總支出',gts,'c-e'),mbox('總結餘',gta-gts,gta-gts>=0?'c-i':'c-e')));
  c.appendChild(foot);
  return c;
}

// ════ 第五頁：個人 ══════════════════════════════════════
function page4(){
  const mk=mkey();
  const cats=S.persType==='income'?P_INC:P_EXP;
  const monthRecs=[...S.personal.filter(r=>r.month===mk)].reverse();
  const myC=S.contribs.filter(c=>c.month===mk&&c.memberId===S.selfId);
  const cTotal=myC.reduce((s,c)=>s+c.amount,0);
  const inc=S.personal.filter(r=>r.month===mk&&r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp=S.personal.filter(r=>r.month===mk&&r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const bal=inc-exp-cTotal;
  const cur=isCurrent();
  const valid=cur&&S.persCat&&S.persAmt>0;
  const wrap=div({},[]);
  if(!cur)wrap.appendChild(readonlyBanner());

  // 我是誰
  const who=div({style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'12px',background:'#1a2f42',border:'1px solid #243d55',borderRadius:'12px',padding:'10px 14px'}},[]);
  who.appendChild(span({style:{fontSize:'.75rem',color:'#6a8fa8',flexShrink:0}},['我是：']));
  const memR=div({style:{display:'flex',gap:'8px',flex:1}},[]);
  S.members.forEach(m=>{
    const on=S.selfId===String(m.id);
    memR.appendChild(btn({style:{display:'flex',alignItems:'center',gap:'6px',padding:'6px 14px',borderRadius:'20px',cursor:'pointer',userSelect:'none',border:'2px solid '+(on?m.color:'#243d55'),color:on?'#fff':'#6a8fa8',background:on?m.color+'33':'none',fontSize:'.85rem',fontWeight:on?700:400},onClick:()=>{S.selfId=String(m.id);LS.set('fm_selfId',S.selfId);render();}},[
      div({style:{width:'20px',height:'20px',borderRadius:'50%',background:m.color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.65rem',fontWeight:700,color:'#fff'}},[m.name[0]]),
      m.name
    ]));
  });
  who.appendChild(memR);
  wrap.appendChild(who);

  wrap.appendChild(g3(mbox('收入',inc,'c-i'),mbox('支出',exp+cTotal,'c-e'),mbox('結餘',bal,bal>=0?'c-i':'c-e')));
  wrap.appendChild(div({style:{marginBottom:'12px'}},[null]));

  // 新增（唯讀時隱藏）
  if(cur){
    const fc=card('新增收支',[]);
    fc.appendChild(typeToggle(S.persType,()=>{S.persType='income';S.persCat=null;render();},()=>{S.persType='expense';S.persCat=null;render();}));
    fc.appendChild(div({},[sl('類別')]));
    fc.appendChild(catGrid(cats,S.persCat,v=>{S.persCat=v;render();}));
    fc.appendChild(div({},[sl('金額')]));
    fc.appendChild(digitInput(S.persAmt,v=>{S.persAmt=v;render();},true));
    const ni=inp({type:'text',value:S.persNote,placeholder:'備註（可留空）',style:{marginTop:'10px',marginBottom:'12px'}});
    ni.addEventListener('input',e=>{S.persNote=e.target.value;});
    fc.appendChild(ni);
    fc.appendChild(btn({className:'btn'+(valid?'':' btn-dis'),onClick:()=>{
      if(!valid)return;
      const catObj=cats.find(c=>c.l===S.persCat)||{i:'📦'};
      save('personal',[...S.personal,{id:uid(),month:mk,type:S.persType,category:S.persCat,catIcon:catObj.i,amount:S.persAmt,note:S.persNote,date:now_()}]);
      S.persAmt=0;S.persNote='';S.persCat=null;render();
    }},[valid?'記帳 ✓':'請選類別並填入金額']));
    wrap.appendChild(fc);
  }

  // 本月明細
  if(monthRecs.length){
    const mc=card('本月明細',[]);
    monthRecs.forEach(r=>{
      const row=div({className:'rec'},[]);
      row.appendChild(div({style:{width:'34px',height:'34px',borderRadius:'50%',background:r.type==='income'?'rgba(45,212,191,.2)':'rgba(248,113,113,.2)',border:'1.5px solid '+(r.type==='income'?'#2dd4bf':'#f87171'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',flexShrink:0}},[r.catIcon]));
      const b=div({style:{flex:1,minWidth:0}},[]);
      b.appendChild(div({className:'row-sb'},[span({style:{fontSize:'.87rem',fontWeight:500}},[r.category]),span({style:{fontFamily:'monospace',fontWeight:700,color:r.type==='income'?'#2dd4bf':'#f87171'}},[(r.type==='income'?'+':'−')+'$'+fmt(r.amount)])]));
      b.appendChild(div({style:{fontSize:'.69rem',color:'#6a8fa8',marginTop:'2px'}},[r.date.slice(5,16)+(r.note?' · '+r.note:'')]));
      row.appendChild(b);
      if(cur)row.appendChild(delBtn('pers-'+r.id,()=>{save('personal',S.personal.filter(x=>x.id!==r.id));render();}));
      mc.appendChild(row);
    });
    wrap.appendChild(mc);
  }

  // 公積金自動扣除
  if(myC.length){
    const cc=card('公積金繳納（自動扣除）',[]);
    myC.forEach((c,i)=>{
      const r=div({className:'rec',style:{borderBottom:i===myC.length-1?'none':'1px solid #243d55'}},[]);
      r.appendChild(div({style:{width:'34px',height:'34px',borderRadius:'50%',background:'rgba(255,209,102,.15)',border:'1.5px solid #ffd166',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',flexShrink:0}},['🏦']));
      const b=div({style:{flex:1}},[]);
      b.appendChild(div({className:'row-sb'},[span({style:{fontSize:'.87rem',fontWeight:500}},['繳納公積金']),span({style:{fontFamily:'monospace',fontWeight:700,color:'#f87171'}},['−$'+fmt(c.amount)])]));
      b.appendChild(div({style:{fontSize:'.69rem',color:'#6a8fa8',marginTop:'2px'}},[c.paidAt.slice(5,16)+' · 自動帶入']));
      r.appendChild(b);
      cc.appendChild(r);
    });
    cc.appendChild(div({style:{display:'flex',justifyContent:'flex-end',paddingTop:'8px',borderTop:'1px solid #243d55',marginTop:'4px'}},[span({style:{fontSize:'.75rem',color:'#6a8fa8',marginRight:'8px'}},['本月繳納小計']),span({style:{fontFamily:'monospace',fontWeight:700,color:'#f87171'}},['−$'+fmt(cTotal)])]));
    wrap.appendChild(cc);
  }

  // 結餘大字
  if(inc>0||exp>0||cTotal>0){
    const bc=card(null,[]);
    bc.appendChild(g3(mbox('個人支出',exp,'c-e'),mbox('公積金',cTotal,'c-g'),mbox('合計支出',exp+cTotal,'c-e')));
    bc.appendChild(div({style:{textAlign:'center',paddingTop:'10px',borderTop:'1px solid #243d55',marginTop:'12px'}},[
      div({style:{fontSize:'.72rem',color:'#6a8fa8',marginBottom:'6px'}},['本月結餘']),
      div({style:{fontFamily:'monospace',fontSize:'2rem',fontWeight:700,color:bal>=0?'#2dd4bf':'#f87171'}},[(bal>=0?'':'−')+'$'+fmt(Math.abs(bal))])
    ]));
    wrap.appendChild(bc);
  }
  return wrap;
}

// ════ 事件綁定 ═══════════════════════════════════════════
document.getElementById('prev-mo').addEventListener('click',()=>{S.mo--;if(S.mo<1){S.mo=12;S.yr--;}S.armedDel={};render(true);});
document.getElementById('next-mo').addEventListener('click',()=>{S.mo++;if(S.mo>12){S.mo=1;S.yr++;}S.armedDel={};render(true);});
document.getElementById('nav').addEventListener('click',e=>{
  const t=e.target.closest('[data-tab]');
  if(t){S.tab=parseInt(t.dataset.tab);S.armedDel={};render(true);}
});

// ════ 啟動 ══════════════════════════════════════════════
// 修正手機瀏覽器 100vh 問題（底部工具列會遮住導航列）
function fixVH(){
  const vh=window.innerHeight*0.01;
  document.documentElement.style.setProperty('--vh',''+vh+'px');
  document.getElementById('app').style.height=window.innerHeight+'px';
}
window.addEventListener('resize',fixVH);
fixVH();
render();
</script>
</body>
