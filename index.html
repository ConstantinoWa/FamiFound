<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1f2d">
<title>FamiFound</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0d1f2d;color:#e8f4fd;font-family:system-ui,sans-serif;height:100vh;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}
#scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 13px 20px;}
nav{display:flex;background:#152536;border-top:1px solid #243d55;flex-shrink:0;}
.nt{flex:1;padding:7px 4px 10px;text-align:center;font-size:.68rem;cursor:pointer;color:#6a8fa8;border-top:2px solid transparent;user-select:none;}
.nt.on{color:#00d4aa;border-top-color:#00d4aa;}
.ni{font-size:1.2rem;margin-bottom:1px;}
.card{background:#1a2f42;border:1px solid #243d55;border-radius:13px;padding:14px;margin-bottom:12px;}
.ct{font-size:.67rem;color:#6a8fa8;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mbox{background:#152536;border-radius:9px;padding:8px 6px;text-align:center;}
.mlbl{font-size:.62rem;color:#6a8fa8;margin-bottom:4px;}
.mval{font-family:monospace;font-size:.88rem;font-weight:700;}
.c-i{color:#2dd4bf;}.c-e{color:#f87171;}.c-g{color:#ffd166;}.c-b{color:#4fc3f7;}.c-m{color:#6a8fa8;}
input,select,textarea{width:100%;background:#1a2f42;border:1px solid #243d55;border-radius:9px;color:#e8f4fd;padding:9px 12px;font-size:.9rem;font-family:inherit;outline:none;-webkit-appearance:none;}
textarea{resize:none;height:52px;}
.btn{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#00d4aa,#00b894);color:#0d1f2d;font-size:.92rem;font-weight:700;cursor:pointer;}
.btn-g{padding:8px 16px;border-radius:9px;border:none;background:linear-gradient(135deg,#00d4aa,#00b894);color:#0d1f2d;font-weight:700;cursor:pointer;font-size:.85rem;white-space:nowrap;}
.btn-w{padding:8px 14px;border-radius:9px;border:1px solid #243d55;background:none;color:#6a8fa8;cursor:pointer;font-size:.85rem;white-space:nowrap;}
.btn-dis{background:#243d55;color:#6a8fa8;cursor:default;}
.chip{display:flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;cursor:pointer;user-select:none;font-size:.83rem;border:1.5px solid #243d55;color:#6a8fa8;background:#152536;}
.chip.on{border-color:#00d4aa;color:#00d4aa;background:rgba(0,212,170,.1);}
.row{display:flex;align-items:center;gap:8px;}
.row-sb{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;}
.sl{font-size:.67rem;color:#6a8fa8;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;}
.sep{border:none;border-bottom:1px solid #243d55;margin:0;}
.delbtn{background:none;border:none;color:#6a8fa8;cursor:pointer;padding:3px 8px;font-size:.8rem;border-radius:6px;white-space:nowrap;flex-shrink:0;}
.delbtn.armed{background:rgba(248,113,113,.15);border:1px solid #f87171;color:#f87171;font-weight:700;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0;}
.dig-wrap{position:relative;display:inline-flex;align-items:center;gap:4px;cursor:text;}
.dig{display:flex;align-items:center;justify-content:center;border-radius:8px;font-family:monospace;font-weight:700;}
.dig.lg{width:42px;height:52px;font-size:1.4rem;}
.dig.sm{width:34px;height:42px;font-size:1.1rem;}
.dig-inp{position:absolute;inset:0;opacity:.01;width:100%;height:100%;border:none;background:transparent;font-size:16px;}
.dig-unit{color:#6a8fa8;font-size:.82rem;margin-left:3px;}
.type-tog{display:flex;gap:8px;margin-bottom:12px;}
.tbtn{flex:1;padding:9px 4px;border-radius:9px;border:1px solid #243d55;background:#152536;color:#6a8fa8;cursor:pointer;font-size:.87rem;font-weight:600;text-align:center;transition:all .15s;}
.tbtn.inc{border-color:#2dd4bf;background:rgba(45,212,191,.12);color:#2dd4bf;}
.tbtn.exp{border-color:#f87171;background:rgba(248,113,113,.12);color:#f87171;}
.rec{display:flex;align-items:flex-start;gap:9px;padding:10px 0;border-bottom:1px solid #243d55;}
.rec:last-child{border-bottom:none;}
.bar-wrap{overflow-x:auto;}
.bar-group{display:flex;align-items:flex-end;gap:8px;min-height:160px;padding:22px 4px 8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;min-width:48px;}
.bar-bars{width:100%;display:flex;gap:3px;align-items:flex-end;height:120px;}
.bar{flex:1;border-radius:4px 4px 0 0;position:relative;min-width:8px;}
.bar-lbl{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:.55rem;white-space:nowrap;}
.prog{height:7px;background:#243d55;border-radius:4px;overflow:hidden;margin-top:12px;}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#00d4aa,#ffd166);}
.legend{display:flex;justify-content:center;gap:16px;margin-top:6px;}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="hdr" style="background:#152536;border-bottom:1px solid #243d55;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="font-size:1rem;font-weight:700;color:#6a8fa8;letter-spacing:1px;">💰 v04070944</div>
    <div style="display:flex;align-items:center;gap:2px;">
      <button id="prev-mo" style="background:none;border:none;color:#00d4aa;font-size:1.3rem;cursor:pointer;padding:2px 8px;">‹</button>
      <span id="mo-lbl" style="font-family:monospace;font-size:.82rem;min-width:66px;text-align:center;"></span>
      <button id="next-mo" style="background:none;border:none;color:#00d4aa;font-size:1.3rem;cursor:pointer;padding:2px 8px;">›</button>
    </div>
  </div>
  <div id="scr"></div>
  <nav id="nav">
    <div class="nt on" data-tab="0"><div class="ni">🏦</div>繳納</div>
    <div class="nt" data-tab="1"><div class="ni">📊</div>分配</div>
    <div class="nt" data-tab="2"><div class="ni">📒</div>記帳</div>
    <div class="nt" data-tab="3"><div class="ni">📈</div>總計</div>
    <div class="nt" data-tab="4"><div class="ni">👤</div>個人</div>
  </nav>
</div>

<script>
// ════ 資料 ══════════════════════════════════════════════
const LS={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch(e){return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};
const pad=n=>String(n).padStart(2,'0');
const fmt=n=>Number(n||0).toLocaleString('zh-TW');
const uid=()=>Date.now()+Math.floor(Math.random()*9999);
const now_=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());};
const prevMK=(yr,mo)=>{let m=mo-1,y=yr;if(m<1){m=12;y--;}return y+'-'+pad(m);};

const DEF_MEM=[{id:1,name:'老公',color:'#2196F3',defaultAmt:25000},{id:2,name:'老婆',color:'#E91E63',defaultAmt:25000}];
const DEF_CATS=[
  {id:1,name:'家用',icon:'🏠',defPP:7000},{id:2,name:'小孩',icon:'👶',defPP:6500},
  {id:3,name:'旅遊',icon:'✈️',defPP:5000},{id:4,name:'汽車',icon:'🚗',defPP:3000},
  {id:5,name:'房子',icon:'🏗️',defPP:3500},{id:6,name:'其他',icon:'📦',defPP:0},
];
const EXP_TYPES=[{i:'🍽️',l:'飲食'},{i:'👗',l:'服飾'},{i:'🏠',l:'居家'},{i:'🚗',l:'交通'},{i:'💊',l:'醫療'},{i:'🎮',l:'娛樂'},{i:'🛒',l:'購物'},{i:'📦',l:'其他'}];
const P_INC=[{i:'💰',l:'薪資'},{i:'🏆',l:'獎金'},{i:'📈',l:'投資'},{i:'🎁',l:'紅包'},{i:'💼',l:'兼差'},{i:'📦',l:'其他'}];
const P_EXP=[{i:'🍽️',l:'飲食'},{i:'👗',l:'服飾'},{i:'🚗',l:'交通'},{i:'💊',l:'醫療'},{i:'🎮',l:'娛樂'},{i:'🛒',l:'購物'},{i:'📦',l:'其他'}];
const CAT_ICONS=['🎯','💡','🌟','📚','💪','🔑','🎪','🧩'];

// ════ 狀態 ══════════════════════════════════════════════
const now=new Date();
let S={
  yr:now.getFullYear(), mo:now.getMonth()+1, tab:0,
  members:    LS.get('fm_mem',   DEF_MEM),
  contribs:   LS.get('fm_cont',  []),
  categories: LS.get('fm_cats',  DEF_CATS),
  allocs:     LS.get('fm_alloc', []),
  expenses:   LS.get('fm_exps',  []),
  extras:     LS.get('fm_extras',[]),
  personal:   LS.get('fm_pers',  []),
  selfId:     LS.get('fm_selfId','1'),
  // UI 暫態
  contribOpen:{}, editDef:{}, editNm:{}, nmVal:{}, defVal:{},
  allocAddOpen:false, allocNewName:'',
  ledgerCat:null, ledgerType:null, ledgerAmt:0, ledgerNote:'',
  extraOpen:{}, extraMode:{},
  persType:'income', persCat:null, persAmt:0, persNote:'',
  armedDel:{},
};
function save(key,val){S[key]=val;LS.set('fm_'+key,val);}
function mkey(){return S.yr+'-'+pad(S.mo);}
function pmkey(){return prevMK(S.yr,S.mo);}
function monthTotal(){return S.contribs.filter(c=>c.month===mkey()).reduce((s,c)=>s+c.amount,0);}
function catBalance(catId,month){
  const a=(S.allocs.find(x=>x.catId===catId&&x.month===month)||{amount:0}).amount;
  const e=S.extras.filter(x=>x.catId===catId&&x.month===month).reduce((s,x)=>s+x.amount,0);
  const s=S.expenses.filter(x=>x.catId===catId&&x.date.startsWith(month)).reduce((s,x)=>s+x.amount,0);
  return a+e-s;
}

// ════ 渲染 ══════════════════════════════════════════════
function render(){
  document.getElementById('mo-lbl').textContent=S.yr+'/'+pad(S.mo);
  document.querySelectorAll('.nt').forEach(el=>el.classList.toggle('on',el.dataset.tab==S.tab));
  const scr=document.getElementById('scr');
  scr.innerHTML='';
  const builders=[page0,page1,page2,page3,page4];
  scr.appendChild(builders[S.tab]());
  scr.scrollTop=0;
}

// ════ 工具 HTML ═════════════════════════════════════════
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c!=null&&c!==false){if(typeof c==='string'){e.appendChild(document.createTextNode(c));}else{e.appendChild(c);}}});
  return e;
}
function div(attrs,children){return el('div',attrs,children);}
function span(attrs,children){return el('span',attrs,children);}
function btn(attrs,children){return el('button',attrs,children);}
function inp(attrs){return el('input',attrs);}
function card(title,children){
  const d=div({className:'card'},[]);
  if(title)d.appendChild(div({className:'ct'},[title]));
  children.forEach(c=>{if(c)d.appendChild(c);});
  return d;
}
function sl(txt){return div({className:'sl'},[txt]);}
function mbox(label,value,colorClass){
  return div({className:'mbox'},[
    div({className:'mlbl'},[label]),
    div({className:'mval '+colorClass},['\$'+fmt(value)])
  ]);
}
function g3(...items){const d=div({className:'g3'},[]);items.forEach(i=>{if(i)d.appendChild(i);});return d;}
function g2(...items){const d=div({className:'g2'},[]);items.forEach(i=>{if(i)d.appendChild(i);});return d;}
function sep(){return el('hr',{className:'sep'});}
function delBtn(key,onDel){
  const b=btn({className:'delbtn'+(S.armedDel[key]?' armed':''),onClick:e=>{
    e.stopPropagation();
    if(S.armedDel[key]){delete S.armedDel[key];onDel();}
    else{S.armedDel[key]=setTimeout(()=>{delete S.armedDel[key];render();},2500);render();}
  }},[S.armedDel[key]?'確定？':'🗑']);
  return b;
}
function digitInput(value,onChange,small){
  const str=String(value||0),padded=str.padStart(5,'0'),sig=5-str.length;
  const W=small?34:42,H=small?42:52,FS=small?'1.1rem':'1.4rem';
  const wrap=div({className:'dig-wrap'},[]);
  padded.split('').forEach((d,i)=>{
    const on=i>=sig&&value>0;
    const dv=div({className:'dig '+(small?'sm':'lg'),style:{
      width:W+'px',height:H+'px',fontSize:FS,
      background:'#1a2f42',color:on?'#e8f4fd':'#6a8fa8',
      border:'1.5px solid '+(on?'#00d4aa':'#243d55')
    }},[d]);
    wrap.appendChild(dv);
  });
  wrap.appendChild(span({className:'dig-unit'},['元']));
  const hidden=inp({type:'tel',inputMode:'numeric',pattern:'[0-9]*',className:'dig-inp',value:value||''});
  hidden.addEventListener('input',e=>{const v=e.target.value.replace(/\D/g,'').slice(0,5);onChange(v?parseInt(v):0);});
  wrap.appendChild(hidden);
  return wrap;
}
function typeToggle(cur,onInc,onExp){
  return div({className:'type-tog'},[
    btn({className:'tbtn'+(cur==='income'?' inc':''),onClick:onInc},['＋ 收入']),
    btn({className:'tbtn'+(cur==='expense'?' exp':''),onClick:onExp},['－ 支出']),
  ]);
}
function catGrid(cats,selected,onSelect){
  const g=div({style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'7px',marginBottom:'14px'}},[]);
  cats.forEach(({i,l})=>{
    const c=div({style:{padding:'8px 4px 7px',borderRadius:'10px',textAlign:'center',cursor:'pointer',userSelect:'none',background:selected===l?'rgba(0,212,170,.1)':'#1a2f42',border:'1.5px solid '+(selected===l?'#00d4aa':'#243d55')},onClick:()=>onSelect(l)},[
      div({style:{fontSize:'1.2rem',marginBottom:'2px'}},[i]),
      div({style:{fontSize:'.63rem',color:selected===l?'#00d4aa':'#6a8fa8'}},[l]),
    ]);
    g.appendChild(c);
  });
  return g;
}
function cssBarChart(data){
  if(!data||!data.length)return div({style:{textAlign:'center',padding:'20px 0',color:'#6a8fa8',fontSize:'.85rem'}},['本月尚無資料']);
  const max=Math.max(...data.map(d=>Math.max(d.alloc,d.spent)),1);
  const wrap=div({className:'bar-wrap'},[]);
  const group=div({className:'bar-group'},[]);
  data.forEach(d=>{
    const col=div({className:'bar-col'},[]);
    const bars=div({className:'bar-bars'},[]);
    const bA=div({className:'bar',style:{background:'#4fc3f7',height:Math.max(d.alloc/max*120,2)+'px'}},[]);
    if(d.alloc>0){const lbl=div({className:'bar-lbl',style:{color:'#4fc3f7'}},[d.alloc>=1000?(d.alloc/1000).toFixed(0)+'k':String(d.alloc)]);bA.appendChild(lbl);}
    const bS=div({className:'bar',style:{background:'#f87171',height:Math.max(d.spent/max*120,d.spent>0?2:0)+'px'}},[]);
    if(d.spent>0){const lbl=div({className:'bar-lbl',style:{color:'#f87171'}},[d.spent>=1000?(d.spent/1000).toFixed(0)+'k':String(d.spent)]);bS.appendChild(lbl);}
    bars.appendChild(bA);bars.appendChild(bS);
    col.appendChild(bars);
    col.appendChild(div({style:{fontSize:'.7rem',textAlign:'center'}},[d.icon]));
    col.appendChild(div({style:{fontSize:'.6rem',color:'#6a8fa8',textAlign:'center',overflow:'hidden',whiteSpace:'nowrap',width:'100%'}},[d.name]));
    group.appendChild(col);
  });
  wrap.appendChild(group);
  const legend=div({className:'legend'},[]);
  [['分配','#4fc3f7'],['支出','#f87171']].forEach(([l,col])=>{
    legend.appendChild(div({style:{display:'flex',alignItems:'center',fontSize:'.75rem',color:'#6a8fa8'}},[
      span({style:{display:'inline-block',width:'10px',height:'10px',borderRadius:'2px',background:col,marginRight:'4px'}},[]),l
    ]));
  });
  wrap.appendChild(legend);
  return wrap;
}

// ════ 第一頁：繳納 ══════════════════════════════════════
function page0(){
  const mk=mkey(),mt=monthTotal();
  const target=S.members.reduce((s,m)=>s+m.defaultAmt,0);
  const monthC=S.contribs.filter(c=>c.month===mk);
  const paidMap={};monthC.forEach(c=>{paidMap[c.memberId]=c;});
  const paidAll=monthC.length>=S.members.length;
  const pct=target>0?Math.min(mt/target*100,100):0;

  const wrap=div({},[]);

  // 總覽卡
  const ov=card(null,[
    g3(mbox('目標',target,'c-g'),mbox('已收',mt,mt>=target?'c-i':'c-e'),
      div({className:'mbox'},[div({className:'mlbl'},['狀態']),div({style:{fontSize:'.82rem',fontWeight:700,color:paidAll?'#2dd4bf':'#ffd166'}},[paidAll?'✅ 完成':'⏳ 待繳'])])
    ),
    div({className:'prog'},[div({className:'prog-fill',style:{width:pct.toFixed(0)+'%'}},[])]),
  ]);
  wrap.appendChild(ov);

  // 成員列
  const mc=card('成員繳納狀況',[]);
  S.members.forEach(m=>{
    mc.appendChild(memberRow(m,paidMap[String(m.id)],mk));
  });
  wrap.appendChild(mc);
  return wrap;
}
function memberRow(m,record,mk){
  const paid=!!record;
  const row=div({style:{padding:'13px 0',borderBottom:'1px solid #243d55'}},[]);
  const top=div({className:'row',style:{gap:'10px'}},[]);
  const av=div({className:'av',style:{background:m.color}},[m.name[0]]);
  top.appendChild(av);
  const info=div({style:{flex:1}},[]);

  // 改名
  if(S.editNm[m.id]){
    const ni=inp({type:'text',value:S.nmVal[m.id]||m.name,style:{marginBottom:'5px'}});
    ni.addEventListener('input',e=>{S.nmVal[m.id]=e.target.value;});
    ni.addEventListener('blur',()=>doRename(m));
    ni.addEventListener('keydown',e=>{if(e.key==='Enter')doRename(m);});
    info.appendChild(ni);
    setTimeout(()=>ni.focus(),50);
  } else {
    const nr=div({className:'row',style:{marginBottom:'3px'}},[
      span({style:{fontSize:'.9rem',fontWeight:700}},[m.name]),
      btn({style:{background:'none',border:'none',color:'#6a8fa8',cursor:'pointer',fontSize:'.72rem'},onClick:()=>{S.editNm[m.id]=true;S.nmVal[m.id]=m.name;render();}},['✏️ 改名'])
    ]);
    info.appendChild(nr);
  }

  // 預設金額
  if(S.editDef[m.id]){
    const dr=div({className:'row',style:{marginBottom:'3px'}},[]);
    const dg=digitInput(S.defVal[m.id]||m.defaultAmt,v=>{S.defVal[m.id]=v;render();},true);
    dr.appendChild(dg);
    dr.appendChild(btn({className:'btn-g',style:{padding:'6px 12px'},onClick:()=>{
      S.members=S.members.map(mm=>mm.id===m.id?Object.assign({},mm,{defaultAmt:S.defVal[m.id]||m.defaultAmt}):mm);
      LS.set('fm_mem',S.members);delete S.editDef[m.id];render();
    }},['存']));
    dr.appendChild(btn({className:'btn-w',style:{padding:'6px 10px'},onClick:()=>{delete S.editDef[m.id];render();}},['取消']));
    info.appendChild(dr);
  } else {
    const defR=div({className:'row'},[ span({style:{fontSize:'.72rem',color:'#6a8fa8'}},['每月預設 $'+fmt(m.defaultAmt)]),btn({style:{background:'none',border:'none',color:'#6a8fa8',cursor:'pointer',fontSize:'.72rem'},onClick:()=>{S.editDef[m.id]=true;S.defVal[m.id]=m.defaultAmt;render();}},['✏️']) ]);
    info.appendChild(defR);
  }

  const status=paid?div({style:{fontSize:'.72rem',color:'#6a8fa8',marginTop:'3px'}},['繳 $'+fmt(record.amount)+' · '+record.paidAt.slice(5,16)]):div({style:{fontSize:'.72rem',color:'#f87171',marginTop:'3px'}},['⚠️ 本月尚未繳納']);
  info.appendChild(status);
  top.appendChild(info);

  if(paid){
    const r=div({className:'row'},[span({style:{color:'#2dd4bf',fontSize:'.82rem',fontWeight:700,background:'rgba(45,212,191,.12)',border:'1px solid #2dd4bf',padding:'4px 12px',borderRadius:'20px'}},['✓ 已繳']),delBtn('cont-'+record.id,()=>{save('contribs',S.contribs.filter(c=>c.id!==record.id));render();})]);
    top.appendChild(r);
  } else {
    const pb=btn({style:{padding:'6px 16px',borderRadius:'20px',border:'1px solid #ffd166',background:'rgba(255,209,102,.1)',color:'#ffd166',cursor:'pointer',fontSize:'.82rem',fontWeight:600,userSelect:'none'},onClick:()=>{S.contribOpen[m.id]=!S.contribOpen[m.id];if(S.contribOpen[m.id])S.defVal['pay'+m.id]=m.defaultAmt;render();}},[ S.contribOpen[m.id]?'取消':'繳納' ]);

  }

function doRename(m){

// ════ 第二頁：分配 ══════════════════════════════════════
function page1(){
  const mk=mkey(),pm=pmkey(),mt=monthTotal();
  const getAlloc=catId=>(S.allocs.find(a=>a.catId===catId&&a.month===mk)||{amount:0}).amount;
  const totalAlloc=S.categories.reduce((s,c)=>s+getAlloc(c.id),0);
  const diff=mt-totalAlloc;
  const mSpent=catId=>S.expenses.filter(e=>e.catId===catId&&e.date.startsWith(mk)).reduce((s,e)=>s+e.amount,0);
  const saveAlloc=(catId,v)=>{
    const base=S.allocs.filter(a=>!(a.catId===catId&&a.month===mk));
    const news=v>0?[{id:uid(),catId,amount:v,month:mk}]:[];
    save('allocs',[...base,...news]);render();
  };

  const wrap=div({},[]);

  // 總覽
  const ov=card(null,[g3(mbox('本月公積金',mt,'c-i'),mbox('已分配',totalAlloc,'c-b'),mbox(diff>=0?'未分配':'超額',Math.abs(diff),diff===0?'c-m':diff>0?'c-g':'c-e'))]);
  if(diff!==0)ov.appendChild(div({style:{fontSize:'.75rem',color:diff>0?'#ffd166':'#f87171',textAlign:'center',marginTop:'8px'}},[diff>0?'⚠️ 還有 $'+fmt(diff)+' 尚未分配':'⚠️ 超額 $'+fmt(-diff)]));
  wrap.appendChild(ov);

  // 各類別
  S.categories.forEach(cat=>{
    const thisA=getAlloc(cat.id),thisS=mSpent(cat.id);
    const suggest=(cat.defPP||0)*S.members.length;
    const catEx=S.extras.filter(x=>x.catId===cat.id&&x.month===mk);
    const exSum=catEx.reduce((s,x)=>s+x.amount,0);
    const prevBal=catBalance(cat.id,pm);
    const hasHistory=S.allocs.some(a=>a.catId===cat.id&&a.month===pm)||S.expenses.some(e=>e.catId===cat.id&&e.date.startsWith(pm));
    const hasCarryover=!!S.extras.find(x=>x.catId===cat.id&&x.month===mk&&x.type==='carryover');
    const c=card(null,[]);

    // 標題
    const th=div({className:'row',style:{marginBottom:'10px'}},[
      span({style:{fontSize:'1.3rem'}},[cat.icon]),
      div({style:{flex:1}},[
        div({style:{fontWeight:700,fontSize:'.95rem'}},[cat.name]),
        cat.defPP>0?div({style:{fontSize:'.67rem',color:'#6a8fa8',marginTop:'1px'}},['每人 $'+fmt(cat.defPP)+' × '+S.members.length+' 人 = \$'+fmt(suggest)]):null
      ].filter(Boolean)),
      delBtn('cat-'+cat.id,()=>{save('categories',S.categories.filter(cc=>cc.id!==cat.id));render();})
    ]);
    c.appendChild(th);

    // 分配輸入
    const aRow=div({style:{display:'flex',alignItems:'flex-end',gap:'10px',marginBottom:'14px',flexWrap:'wrap'}},[]);
    const aDiv=div({},[sl('本月分配'),digitInput(thisA,v=>saveAlloc(cat.id,v),true)]);
    aRow.appendChild(aDiv);
    if(suggest>0&&thisA!==suggest){
      aRow.appendChild(btn({style:{padding:'6px 12px',borderRadius:'8px',border:'1px solid #ffd166',background:'rgba(255,209,102,.08)',color:'#ffd166',cursor:'pointer',fontSize:'.76rem',marginBottom:'2px'},onClick:()=>saveAlloc(cat.id,suggest)},['套用 $'+fmt(suggest)]));
    }
    c.appendChild(aRow);

    // 額外收入列表
    if(catEx.length){
      const exList=div({style:{marginBottom:'10px'}},[]);
      catEx.forEach(ex=>{
        const r=div({style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',background:'#152536',borderRadius:'8px',marginBottom:'5px'}},[]);
        r.appendChild(span({style:{fontSize:'.78rem',color:ex.type==='carryover'?'#4fc3f7':'#2dd4bf',flex:1}},[ex.type==='carryover'?'↩️ 上月結餘':'🎁 '+ex.label]));
        r.appendChild(span({style:{fontFamily:'monospace',fontSize:'.82rem',fontWeight:600,color:ex.type==='carryover'?'#4fc3f7':'#2dd4bf'}},['+ $'+fmt(ex.amount)]));
        r.appendChild(delBtn('extra-'+ex.id,()=>{save('extras',S.extras.filter(x=>x.id!==ex.id));render();}));
        exList.appendChild(r);
      });
      c.appendChild(exList);
    }

    // 額外收入新增
    c.appendChild(extraRow(cat.id,mk,prevBal,hasHistory,hasCarryover));

    // 小結
    c.appendChild(div({style:{marginTop:'12px'}},[g3(mbox('本月收入',thisA+exSum,'c-i'),mbox('本月支出',thisS,'c-e'),mbox('本月結餘',thisA+exSum-thisS,thisA+exSum-thisS>=0?'c-i':'c-e'))]));
    wrap.appendChild(c);
  });

  // 新增分類
  if(S.allocAddOpen){
    const ac=card(null,[sl('新分類名稱')]);
    const row=div({className:'row'},[]);
    const ni=inp({type:'text',value:S.allocNewName,placeholder:'例：教育、保險…'});
    ni.addEventListener('input',e=>{S.allocNewName=e.target.value;});
    ni.addEventListener('keydown',e=>{if(e.key==='Enter')doAddCat();});
    row.appendChild(ni);
    row.appendChild(btn({className:'btn-g',onClick:doAddCat},['新增']));
    row.appendChild(btn({className:'btn-w',onClick:()=>{S.allocAddOpen=false;render();}},['取消']));
    ac.appendChild(row);
    wrap.appendChild(ac);
    setTimeout(()=>ni.focus(),50);
  } else {
    wrap.appendChild(btn({style:{width:'100%',padding:'12px',borderRadius:'11px',border:'1.5px dashed #243d55',background:'none',color:'#6a8fa8',cursor:'pointer',fontSize:'.88rem'},onClick:()=>{S.allocAddOpen=true;S.allocNewName='';render();}},['＋ 新增分類']));
  }
  return wrap;
}
function doAddCat(){
  const nm=S.allocNewName.trim();if(!nm)return;
  save('categories',[...S.categories,{id:uid(),name:nm,icon:CAT_ICONS[S.categories.length%CAT_ICONS.length],defPP:0}]);
  S.allocAddOpen=false;render();
}
function extraRow(catId,mk,prevBal,hasHistory,hasCarryover){
  const key='ex-'+catId;
  if(!S.extraOpen[key]){
    return btn({style:{width:'100%',padding:'7px',borderRadius:'8px',border:'1px dashed #243d55',background:'none',color:'#6a8fa8',cursor:'pointer',fontSize:'.78rem'},onClick:()=>{S.extraOpen[key]=true;S.extraMode[key]='carryover';render();}},['＋ 新增額外收入（結餘轉入 / 補助）']);
  }
  const mode=S.extraMode[key]||'carryover';
  const d=div({style:{background:'#152536',borderRadius:'10px',padding:'12px',marginBottom:'4px'}},[]);
  // 模式切換
  const modeRow=div({className:'row',style:{marginBottom:'12px'}},[]);
  [['carryover','↩️ 上月結餘'],['subsidy','🎁 補助/其他']].forEach(([m,l])=>{
    modeRow.appendChild(btn({style:{flex:1,padding:'7px 6px',borderRadius:'8px',textAlign:'center',cursor:'pointer',fontSize:'.78rem',fontWeight:mode===m?700:400,border:'1.5px solid '+(mode===m?'#00d4aa':'#243d55'),background:mode===m?'rgba(0,212,170,.1)':'none',color:mode===m?'#00d4aa':'#6a8fa8',userSelect:'none'},onClick:()=>{S.extraMode[key]=m;render();}},[ l ]));
  });
  d.appendChild(modeRow);

  if(mode==='carryover'){
    if(hasCarryover){
      d.appendChild(div({style:{fontSize:'.8rem',color:'#6a8fa8',textAlign:'center',padding:'6px 0'}},['本月已新增上月結餘']));
    } else if(hasHistory){
      d.appendChild(div({style:{fontSize:'.8rem',color:'#6a8fa8',marginBottom:'10px'}},['系統計算上月結餘：\$'+fmt(prevBal)+(prevBal<=0?' （赤字）':'')]));
      if(prevBal>0){
        d.appendChild(btn({className:'btn-g',style:{width:'100%'},onClick:()=>{
          save('extras',[...S.extras,{id:uid(),catId,month:mk,type:'carryover',label:'上月結餘',amount:prevBal}]);
          delete S.extraOpen[key];render();
        }},['確認轉入 $'+fmt(prevBal)]));
      } else {
        d.appendChild(btn({className:'btn-w',style:{width:'100%'},onClick:()=>{delete S.extraOpen[key];render();}},['關閉']));
      }
    } else {
      d.appendChild(div({style:{fontSize:'.78rem',color:'#6a8fa8',marginBottom:'8px'}},['首次使用，請手動輸入上月結餘：']));
      const manKey='manAmt-'+catId;
      d.appendChild(digitInput(S[manKey]||0,v=>{S[manKey]=v;render();},true));
      const r=div({className:'row',style:{marginTop:'10px'}},[]);
      r.appendChild(btn({className:'btn-g',onClick:()=>{
        const a=S[manKey]||0;if(!a||a<=0)return;
        save('extras',[...S.extras,{id:uid(),catId,month:mk,type:'carryover',label:'上月結餘',amount:a}]);
        delete S.extraOpen[key];delete S[manKey];render();
      }},['確認']));
      r.appendChild(btn({className:'btn-w',onClick:()=>{delete S.extraOpen[key];render();}},['取消']));
      d.appendChild(r);
    }
  } else {
    const lblKey='subLbl-'+catId,amtKey='subAmt-'+catId;
    d.appendChild(div({},[sl('補助名稱')]));
    const ni=inp({type:'text',value:S[lblKey]||'',placeholder:'育兒津貼…'});
    ni.addEventListener('input',e=>{S[lblKey]=e.target.value;});
    d.appendChild(ni);
    d.appendChild(div({style:{marginTop:'8px',marginBottom:'10px'}},[sl('金額'),digitInput(S[amtKey]||0,v=>{S[amtKey]=v;render();},true)]));
    const r=div({className:'row'},[]);
    r.appendChild(btn({className:'btn-g',onClick:()=>{
      const a=S[amtKey]||0,l=(S[lblKey]||'').trim();if(!a||!l)return;
      save('extras',[...S.extras,{id:uid(),catId,month:mk,type:'subsidy',label:l,amount:a}]);
      delete S.extraOpen[key];delete S[lblKey];delete S[amtKey];render();
    }},['新增']));
    r.appendChild(btn({className:'btn-w',onClick:()=>{delete S.extraOpen[key];render();}},['取消']));
    d.appendChild(r);
  }
  return d;
}

function page3(){

    const cc=card('公積金繳納（自動扣除）',[]);
    myC.forEach((c,i)=>{
      const r=div({className:'rec',style:{borderBottom:i===myC.length-1?'none':'1px solid #243d55'}},[]);
      r.appendChild(div({style:{width:'34px',height:'34px',borderRadius:'50%',background:'rgba(255,209,102,.15)',border:'1.5px solid #ffd166',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',flexShrink:0}},['🏦']));
      const b=div({style:{flex:1}},[]);
      b.appendChild(div({className:'row-sb'},[span({style:{fontSize:'.87rem',fontWeight:500}},['繳納公積金']),span({style:{fontFamily:'monospace',fontWeight:700,color:'#f87171'}},['−$'+fmt(c.amount)])]));
      b.appendChild(div({style:{fontSize:'.69rem',color:'#6a8fa8',marginTop:'2px'}},[c.paidAt.slice(5,16)+' · 自動帶入']));
      r.appendChild(b);
      cc.appendChild(r);
    });
    cc.appendChild(div({style:{display:'flex',justifyContent:'flex-end',paddingTop:'8px',borderTop:'1px solid #243d55',marginTop:'4px'}},[span({style:{fontSize:'.75rem',color:'#6a8fa8',marginRight:'8px'}},['本月繳納小計']),span({style:{fontFamily:'monospace',fontWeight:700,color:'#f87171'}},['−$'+fmt(cTotal)])]));
    wrap.appendChild(cc);
  }

  // 結餘大字
  if(inc>0||exp>0||cTotal>0){
    const bc=card(null,[]);
    bc.appendChild(g3(mbox('個人支出',exp,'c-e'),mbox('公積金',cTotal,'c-g'),mbox('合計支出',exp+cTotal,'c-e')));
    bc.appendChild(div({style:{textAlign:'center',paddingTop:'10px',borderTop:'1px solid #243d55',marginTop:'12px'}},[
      div({style:{fontSize:'.72rem',color:'#6a8fa8',marginBottom:'6px'}},['本月結餘']),
      div({style:{fontFamily:'monospace',fontSize:'2rem',fontWeight:700,color:bal>=0?'#2dd4bf':'#f87171'}},[(bal>=0?'':'−')+'$'+fmt(Math.abs(bal))])
    ]));
    wrap.appendChild(bc);
  }
  return wrap;
}

// ════ 事件綁定 ═══════════════════════════════════════════
document.getElementById('prev-mo').addEventListener('click',()=>{S.mo--;if(S.mo<1){S.mo=12;S.yr--;}S.armedDel={};render();});
document.getElementById('next-mo').addEventListener('click',()=>{S.mo++;if(S.mo>12){S.mo=1;S.yr++;}S.armedDel={};render();});
document.getElementById('nav').addEventListener('click',e=>{
  const t=e.target.closest('[data-tab]');
  if(t){S.tab=parseInt(t.dataset.tab);S.armedDel={};render();}
});

// ════ 啟動 ══════════════════════════════════════════════
render();
</script>
</body>
</html>
